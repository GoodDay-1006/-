<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國文闖關王 v2</title>
<style>
:root {
  --bg:#fef9f0; --ink:#2d2016; --red:#c0392b; --gold:#e8a020;
  --teal:#1a7a6e; --blue:#1a4a7a; --pink:#d4547a; --purple:#6c3483;
  --card:#ffffff; --shadow:rgba(45,32,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Microsoft JhengHei','微軟正黑體',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(232,160,32,.08) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(26,122,110,.07) 0%,transparent 70%);pointer-events:none;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

/* ══ HOME ══ */
#home{padding:28px 16px;justify-content:flex-start;background:linear-gradient(160deg,#fef3dc 0%,#fef9f0 60%);}
.brush-title{font-size:clamp(1.8rem,7vw,3rem);font-weight:900;color:var(--ink);letter-spacing:.12em;position:relative;display:inline-block;padding:0 12px;}
.brush-title::before,.brush-title::after{content:'';position:absolute;height:4px;width:38%;background:var(--gold);bottom:-5px;border-radius:2px;}
.brush-title::before{left:0;}.brush-title::after{right:0;}
.home-sub{color:var(--teal);font-size:.85rem;letter-spacing:.18em;margin-top:12px;}
.home-header{text-align:center;margin-bottom:20px;width:100%;}

/* nav tabs */
.nav-tabs{display:flex;gap:8px;width:100%;max-width:660px;margin-bottom:18px;border-bottom:2px solid rgba(45,32,22,.1);padding-bottom:0;}
.nav-tab{padding:9px 18px;font-weight:700;font-size:.88rem;color:rgba(45,32,22,.45);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal);}

.tab-panel{display:none;width:100%;max-width:660px;}
.tab-panel.active{display:block;}

.slabel{font-size:.72rem;letter-spacing:.18em;color:rgba(45,32,22,.4);margin-bottom:8px;margin-top:16px;}
.topic-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px;}
.tchip{padding:6px 14px;border-radius:18px;border:1.5px solid rgba(45,32,22,.2);background:white;font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--ink);user-select:none;}
.tchip.on{background:var(--gold);border-color:var(--gold);color:white;font-weight:700;}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px;}
@media(max-width:400px){.mode-grid{grid-template-columns:1fr;}}
.mcard{background:white;border:2px solid rgba(45,32,22,.1);border-radius:13px;padding:16px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.mcard:hover{transform:translateY(-2px);box-shadow:0 5px 16px var(--shadow);}
.mcard.picked{border-color:var(--teal);background:#edfaf8;}
.mcard .micon{font-size:1.8rem;display:block;margin-bottom:6px;}
.mcard .mtitle{font-weight:900;font-size:.95rem;color:var(--ink);}
.mcard .mdesc{font-size:.72rem;color:rgba(45,32,22,.5);margin-top:3px;line-height:1.4;}

.go-btn{background:var(--red);color:white;border:none;border-radius:12px;padding:14px 0;font-size:1.05rem;font-weight:900;letter-spacing:.12em;cursor:pointer;margin-top:18px;transition:all .2s;box-shadow:0 4px 14px rgba(192,57,43,.32);width:100%;max-width:660px;}
.go-btn:hover:not(:disabled){transform:translateY(-2px);}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── 錯題複習區 ── */
.wrong-panel{width:100%;max-width:660px;}
.wrong-summary{background:white;border-radius:14px;padding:16px;box-shadow:0 3px 14px var(--shadow);margin-bottom:14px;}
.wrong-summary h3{font-size:1rem;font-weight:900;color:var(--ink);margin-bottom:8px;}
.wrong-stats{display:flex;gap:14px;flex-wrap:wrap;}
.wstat{background:var(--bg);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:90px;}
.wstat .wnum{font-size:1.6rem;font-weight:900;color:var(--red);}
.wstat .wlbl{font-size:.72rem;color:rgba(45,32,22,.5);}
.wrong-list{display:flex;flex-direction:column;gap:8px;}
.wrong-item{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px var(--shadow);border-left:4px solid var(--red);}
.wrong-item .wi-era{font-size:.7rem;color:rgba(45,32,22,.4);letter-spacing:.08em;margin-bottom:4px;}
.wrong-item .wi-q{font-size:.88rem;color:var(--ink);font-weight:700;line-height:1.5;}
.wrong-item .wi-ans{font-size:.8rem;color:var(--teal);margin-top:4px;}
.empty-wrong{text-align:center;padding:40px;color:rgba(45,32,22,.35);font-size:.9rem;}
.practice-wrong-btn{background:var(--teal);color:white;border:none;border-radius:10px;padding:13px 0;font-size:1rem;font-weight:900;cursor:pointer;width:100%;max-width:660px;margin-top:14px;transition:all .2s;}
.practice-wrong-btn:hover{opacity:.88;}
.clear-wrong-btn{background:transparent;color:rgba(45,32,22,.4);border:1px solid rgba(45,32,22,.2);border-radius:8px;padding:8px 18px;font-size:.8rem;cursor:pointer;margin-top:8px;width:100%;max-width:660px;}

/* ══ GAME ══ */
#game{background:var(--bg);padding:10px 14px 24px;}
.gbar{width:100%;max-width:660px;display:flex;justify-content:space-between;align-items:center;background:var(--ink);border-radius:12px;padding:9px 14px;margin-bottom:12px;color:white;}
.gbar-left{font-size:.78rem;opacity:.6;}
.gbar-score{background:var(--gold);color:var(--ink);font-weight:900;border-radius:14px;padding:3px 12px;font-size:.9rem;}
.gbar-timer{font-weight:900;font-size:1rem;min-width:24px;text-align:center;}
.gbar-timer.hot{color:var(--red);animation:blink .5s infinite alternate;}
@keyframes blink{to{opacity:.35;}}
.prog-bar{height:3px;background:rgba(255,255,255,.18);border-radius:2px;margin-top:5px;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}

.qcard{background:white;border-radius:15px;padding:20px 18px;width:100%;max-width:660px;box-shadow:0 4px 18px var(--shadow);margin-bottom:12px;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--teal);border-radius:5px 0 0 5px;}

.qtag{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:9px;margin-bottom:10px;letter-spacing:.05em;}
.qtag.mc{background:#e8f4fd;color:var(--blue);}
.qtag.tf{background:#fef9e7;color:#b7950b;}
.qtag.fill{background:#eafaf1;color:var(--teal);}
.qtag.match{background:#fdebd0;color:#ca6f1e;}
.qtag.pic{background:#fde8f0;color:var(--pink);}
.qtag.sort{background:#ede8fd;color:var(--purple);}
.qtag.fsy{background:#e8fde8;color:#1a7a1a;}

.qtext{font-size:clamp(.92rem,2.8vw,1.1rem);font-weight:700;color:var(--ink);line-height:1.75;margin-bottom:14px;}
.qsub{font-size:.8rem;color:rgba(45,32,22,.45);margin-bottom:12px;font-style:italic;}

/* options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:380px){.opts{grid-template-columns:1fr;}}
.opt{background:#f7f7f5;border:2px solid #e0ddd8;border-radius:9px;padding:10px 12px;font-size:.85rem;color:var(--ink);cursor:pointer;text-align:left;transition:all .18s;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--teal);background:#edfaf8;}
.opt.ok{background:#d5f5e3;border-color:var(--teal);color:var(--teal);font-weight:700;}
.opt.bad{background:#fadbd8;border-color:var(--red);color:var(--red);}

/* TF */
.tf-row{display:flex;gap:10px;justify-content:center;}
.tfbtn{flex:1;max-width:130px;padding:13px;border-radius:11px;border:2px solid #e0ddd8;background:#f7f7f5;font-size:1.3rem;font-weight:900;cursor:pointer;transition:all .18s;color:var(--ink);}
.tfbtn:hover:not(:disabled){transform:scale(1.05);}
.tfbtn.ok{background:#d5f5e3;border-color:var(--teal);}
.tfbtn.bad{background:#fadbd8;border-color:var(--red);}

/* Fill */
.fill-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.fill-in{border:2px solid #ccc;border-radius:8px;padding:8px 12px;font-size:.92rem;outline:none;min-width:140px;flex:1;transition:border-color .2s;color:var(--ink);background:white;}
.fill-in:focus{border-color:var(--teal);}
.fill-in.ok{border-color:var(--teal);background:#d5f5e3;}
.fill-in.bad{border-color:var(--red);background:#fadbd8;}
.sub-btn{background:var(--blue);color:white;border:none;border-radius:8px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.sub-btn:hover{opacity:.85;}

/* Match */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{background:#f7f7f5;border:2px solid #e0ddd8;border-radius:9px;padding:9px 11px;font-size:.82rem;cursor:pointer;transition:all .18s;min-height:40px;display:flex;align-items:center;color:var(--ink);line-height:1.35;}
.match-item:hover:not(.done){border-color:var(--teal);}
.match-item.selected{border-color:var(--gold);background:#fef9e7;font-weight:700;}
.match-item.matched{border-color:var(--teal);background:#d5f5e3;color:var(--teal);font-weight:700;}
.match-item.wrong-flash{border-color:var(--red);background:#fadbd8;}

/* Sort */
.sort-list{display:flex;flex-direction:column;gap:6px;}
.sort-item{background:#f0f4ff;border:2px solid #c5cae9;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:grab;font-size:.85rem;user-select:none;transition:box-shadow .15s;color:var(--ink);}
.sort-item:active{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.14);}
.sort-item.dragging{opacity:.42;}
.sort-handle{color:#aaa;}
.sort-check{background:var(--teal);color:white;border:none;border-radius:9px;padding:9px 20px;font-weight:700;font-size:.85rem;cursor:pointer;margin-top:8px;transition:opacity .2s;}
.sort-check:hover{opacity:.85;}

/* FSY (形聲義) */
.fsy-char{font-size:4rem;font-weight:900;text-align:center;color:var(--ink);margin:8px 0 16px;letter-spacing:.1em;}
.fsy-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:.82rem;}
.fsy-table th{background:var(--teal);color:white;padding:6px 10px;text-align:center;}
.fsy-table td{border:1px solid #e0ddd8;padding:7px 10px;text-align:center;}
.fsy-table tr:nth-child(even) td{background:#f7f7f5;}

/* Idiom box */
.idiom-box{background:#fef3dc;border:1.5px solid var(--gold);border-radius:10px;padding:12px 14px;margin-top:12px;display:none;}
.idiom-box.show{display:block;}
.idiom-box .ib-title{font-size:.72rem;color:var(--gold);font-weight:700;letter-spacing:.1em;margin-bottom:5px;}
.idiom-box .ib-word{font-size:1.1rem;font-weight:900;color:var(--ink);margin-bottom:4px;}
.idiom-box .ib-def{font-size:.85rem;color:rgba(45,32,22,.75);line-height:1.6;}
.idiom-box .ib-ex{font-size:.78rem;color:rgba(45,32,22,.5);margin-top:4px;font-style:italic;}

/* Feedback */
.fb-box{border-radius:10px;padding:11px 14px;margin-top:12px;font-size:.83rem;line-height:1.6;display:none;}
.fb-box.show{display:block;}
.fb-box.ok{background:#d5f5e3;color:#1e8449;border-left:4px solid var(--teal);}
.fb-box.bad{background:#fadbd8;color:var(--red);border-left:4px solid var(--red);}
.fb-title{font-weight:900;margin-bottom:2px;}

.next-btn{background:var(--ink);color:white;border:none;border-radius:10px;padding:12px 0;font-weight:900;font-size:.98rem;cursor:pointer;width:100%;max-width:660px;margin-top:4px;display:none;transition:background .2s;}
.next-btn.show{display:block;}
.next-btn:hover{background:var(--teal);}

/* ══ RESULT ══ */
#result{background:linear-gradient(160deg,#fef3dc 0%,#fef9f0 100%);padding:36px 16px;justify-content:center;}
.result-card{background:white;border-radius:18px;padding:30px 24px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 28px var(--shadow);}
.r-emoji{font-size:3.5rem;margin-bottom:8px;}
.r-title{font-size:1.7rem;font-weight:900;color:var(--ink);margin-bottom:5px;}
.r-score{font-size:3rem;font-weight:900;color:var(--gold);}
.r-max{font-size:.82rem;color:rgba(45,32,22,.4);margin-bottom:14px;}
.r-stars{font-size:1.8rem;margin-bottom:14px;}
.r-msg{font-size:.88rem;color:rgba(45,32,22,.6);line-height:1.7;margin-bottom:18px;}
.r-weak{background:#fef9f0;border-radius:10px;padding:12px 14px;text-align:left;margin-bottom:18px;}
.r-weak h4{color:var(--gold);font-size:.78rem;letter-spacing:.1em;margin-bottom:6px;}
.r-weak p{font-size:.8rem;color:rgba(45,32,22,.7);line-height:1.8;}
.r-btns{display:flex;gap:9px;flex-wrap:wrap;}
.r-btn{flex:1;padding:11px;border-radius:9px;font-weight:900;font-size:.92rem;cursor:pointer;border:none;transition:all .2s;}
.r-btn.pri{background:var(--red);color:white;}
.r-btn.sec{background:#f0f0ee;color:var(--ink);}
.r-btn.ter{background:var(--teal);color:white;}
.r-btn:hover{transform:translateY(-2px);}
.r-saved{font-size:.75rem;color:var(--teal);margin-top:10px;}

/* combo / confetti */
.combo{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:999;font-size:2.2rem;font-weight:900;color:var(--gold);pointer-events:none;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);}
.combo.show{transform:translate(-50%,-80%) scale(1);}
.cf{position:fixed;top:-10px;width:8px;height:14px;border-radius:2px;pointer-events:none;z-index:998;animation:fall 2s ease-in forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* pic scene */
.pic-scene{width:100%;max-width:380px;margin:0 auto 14px;border-radius:11px;overflow:hidden;border:2px solid #e0ddd8;}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="brush-title">國文闖關王</div>
    <div class="home-sub">國一第一冊 · 語文複習講義 v2</div>
  </div>

  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab active" data-panel="play">🎮 開始遊戲</div>
    <div class="nav-tab" data-panel="wrong">❌ 錯題複習區</div>
  </div>

  <!-- 遊戲面板 -->
  <div class="tab-panel active" id="panel-play">
    <div class="slabel">選擇主題（可多選）</div>
    <div class="topic-row" id="topicRow">
      <div class="tchip on" data-t="fsy">🔤 形音義辨析</div>
      <div class="tchip on" data-t="char">📖 多義字</div>
      <div class="tchip on" data-t="idiom">🌸 成語詞語</div>
      <div class="tchip on" data-t="punc">✏️ 標點符號</div>
      <div class="tchip on" data-t="rhetoric">🎭 修辭法</div>
      <div class="tchip on" data-t="repeat">🔁 疊字</div>
      <div class="tchip on" data-t="confuse">⚠️ 易混淆字</div>
      <div class="tchip on" data-t="analects">📜 論語</div>
      <div class="tchip on" data-t="measure">🔢 量詞</div>
    </div>

    <div class="slabel">選擇模式</div>
    <div class="mode-grid">
      <div class="mcard" data-m="normal"><span class="micon">📝</span><div class="mtitle">練習模式</div><div class="mdesc">不限時・50題・有解析</div></div>
      <div class="mcard" data-m="timed"><span class="micon">⏱️</span><div class="mtitle">限時模式</div><div class="mdesc">每題20秒・50題</div></div>
      <div class="mcard" data-m="blitz"><span class="micon">⚡</span><div class="mtitle">閃電模式</div><div class="mdesc">每題8秒・20題</div></div>
      <div class="mcard" data-m="survival"><span class="micon">❤️</span><div class="mtitle">生存模式</div><div class="mdesc">答錯3次結束・20題</div></div>
    </div>
    <button class="go-btn" id="goBtn" disabled>請選擇主題與模式</button>
  </div>

  <!-- 錯題複習面板 -->
  <div class="tab-panel" id="panel-wrong">
    <div class="wrong-panel" id="wrongPanel"></div>
    <button class="practice-wrong-btn" id="practiceWrongBtn" style="display:none;" onclick="startWrongPractice()">針對錯題練習 🔥</button>
    <button class="clear-wrong-btn" id="clearWrongBtn" style="display:none;" onclick="clearWrong()">清除所有錯題記錄</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="game">
  <div class="gbar">
    <div>
      <div class="gbar-left" id="gInfo">第 1 / 50 題</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="gbar-timer" id="gTimer" style="display:none;">20</div>
      <div>
        <div class="gbar-score" id="gScore">0 分</div>
        <div style="font-size:.68rem;color:rgba(255,255,255,.5);text-align:right;margin-top:2px;" id="gLives"></div>
      </div>
    </div>
  </div>

  <div class="qcard" id="qcard">
    <div class="qtag mc" id="qtag">選擇題</div>
    <div class="qtext" id="qtext">載入中…</div>
    <div class="qsub" id="qsub"></div>
    <div id="ans-area"></div>
    <div class="idiom-box" id="idiomBox">
      <div class="ib-title">📚 成語小教室</div>
      <div class="ib-word" id="ibWord"></div>
      <div class="ib-def"  id="ibDef"></div>
      <div class="ib-ex"   id="ibEx"></div>
    </div>
    <div class="fb-box" id="fbbox">
      <div class="fb-title" id="fbtitle"></div>
      <div id="fbmsg"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn">下一題 →</button>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="result">
  <div class="result-card">
    <div class="r-emoji" id="rEmoji">🎉</div>
    <div class="r-title" id="rTitle">太棒了！</div>
    <div class="r-score" id="rScore">0</div>
    <div class="r-max"  id="rMax">分</div>
    <div class="r-stars" id="rStars">⭐⭐⭐</div>
    <div class="r-msg"  id="rMsg"></div>
    <div class="r-weak" id="rWeak" style="display:none;"><h4>📌 本次建議複習</h4><p id="rWeakList"></p></div>
    <div class="r-saved" id="rSaved"></div>
    <div class="r-btns" style="margin-top:16px;">
      <button class="r-btn pri" onclick="restart()">再玩一次 🔄</button>
      <button class="r-btn ter" onclick="goWrong()">查看錯題 ❌</button>
      <button class="r-btn sec" onclick="goHome()">回首頁 🏠</button>
    </div>
  </div>
</div>

<div class="combo" id="combo"></div>

<script>
// ══════════════════════════════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════════════════════════════
const STORAGE_KEY = 'cw_wrong_v2';
function loadWrongBank(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e){ return []; }
}
function saveWrongBank(arr){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }catch(e){}
}
function addToWrongBank(q){
  let bank = loadWrongBank();
  const already = bank.findIndex(x => x.q === q.q);
  if(already === -1){
    bank.push({...q, wrongCount:1, lastWrong: Date.now()});
  } else {
    bank[already].wrongCount = (bank[already].wrongCount||1)+1;
    bank[already].lastWrong = Date.now();
  }
  saveWrongBank(bank);
}
function removeFromWrongBank(q){
  let bank = loadWrongBank();
  bank = bank.filter(x => x.q !== q.q);
  saveWrongBank(bank);
}

// ══════════════════════════════════════════════════════
//  QUESTION BANK (50+ questions)
// ══════════════════════════════════════════════════════
const QB = [

// ══ 形音義辨析 (fsy) ══
{t:'fsy',era:'形音義・煤/媒/黴',type:'fsy',

let S = {

// ══ TOPIC & MODE ══
document.querySelectorAll('.tchip').forEach(c=>{
  c.addEventListener('click',()=>{ c.classList.toggle('on'); updateGo(); });
});

function updateGo(){
  S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);
  const btn=document.getElementById('goBtn');
  if(S.topics.length&&S.mode){ btn.disabled=false; btn.textContent='開始闖關 🚀'; }
  else{ btn.disabled=true; btn.textContent='請選擇主題與模式'; }
}
document.getElementById('goBtn').addEventListener('click',startGame);

// ══ START ══
function startGame(){
  S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);
  S.score=0; S.lives=3; S.combo=0; S.answered=false; S.wrong={}; S.isWrongPractice=false;
  const isLong = S.mode==='normal'||S.mode==='timed';
  const maxQ = isLong ? 50 : 20;
  let pool=QB.filter(q=>S.topics.includes(q.t));
  pool=shuffle(pool);
  S.qs=pool.slice(0,Math.min(maxQ,pool.length));
  S.cur=0;
  showScreen('game');
  renderQ();
}

function startWrongPractice(){
  const bank=loadWrongBank();
  if(!bank.length){ alert('沒有錯題記錄！'); return; }
  S.score=0; S.lives=3; S.combo=0; S.answered=false; S.wrong={}; S.isWrongPractice=true;
  S.mode='normal';
  S.qs=shuffle([...bank]).slice(0,Math.min(20,bank.length));
  S.cur=0;
  showScreen('game');
  renderQ();
}

// ══ RENDER Q ══
function renderQ(){
  if(S.cur>=S.qs.length){ showResult(); return; }
  const q=S.qs[S.cur];
  S.answered=false;

  const total=S.qs.length;
  document.getElementById('gInfo').textContent=`第 ${S.cur+1} / ${total} 題${S.isWrongPractice?' 📌錯題練習':''}`;
  document.getElementById('progFill').style.width=`${(S.cur/total)*100}%`;
  document.getElementById('gScore').textContent=`${S.score} 分`;
  if(S.mode==='survival'){
    document.getElementById('gLives').textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));
  } else { document.getElementById('gLives').textContent=''; }

  const tagEl=document.getElementById('qtag');
  const tMap={mc:'選擇題',tf:'是非題',fill:'填空題',match:'連連看',pic:'看圖答題',sort:'排序題',fsy:'形音義辨析'};
  const cMap={mc:'mc',tf:'tf',fill:'fill',match:'match',pic:'pic',sort:'sort',fsy:'fsy'};
  tagEl.textContent=tMap[q.type]||'題目';
  tagEl.className=`qtag ${cMap[q.type]||'mc'}`;

  document.getElementById('qtext').textContent=q.q;
  document.getElementById('qsub').textContent=q.hint||'';

  const area=document.getElementById('ans-area');
  area.innerHTML='';

  document.getElementById('idiomBox').className='idiom-box';
  document.getElementById('fbbox').className='fb-box';
  document.getElementById('nextBtn').className='next-btn';

  if(q.type==='fsy')      renderFSY(q,area);
  else if(q.type==='mc')  renderMC(q,area);
  else if(q.type==='tf')  renderTF(q,area);
  else if(q.type==='fill')renderFill(q,area);
  else if(q.type==='match')renderMatch(q,area);
  else if(q.type==='pic') renderPic(q,area);
  else if(q.type==='sort')renderSort(q,area);

  clearInterval(S.timer);
  const te=document.getElementById('gTimer');
  if(S.mode==='blitz'||S.mode==='timed'){
    te.style.display='block';
    startTimer(S.mode==='blitz'?8:20);
  } else { te.style.display='none'; }
}

// ══ FSY ══
function renderFSY(q,area){
  // Show char table
  const tbl=document.createElement('table');
  tbl.className='fsy-table';
  tbl.innerHTML=`<tr><th>字形</th><th>讀音</th><th>字義</th><th>詞例</th></tr>`+
    q.chars.map(c=>`<tr><td><strong style="font-size:1.3rem;">${c.char}</strong></td><td>${c.ping}</td><td>${c.def}</td><td style="font-size:.78rem;">${c.ex}</td></tr>`).join('');
  area.appendChild(tbl);

  const subQ=document.createElement('div');
  subQ.style.cssText='font-weight:700;font-size:.95rem;color:var(--ink);margin:12px 0 10px;line-height:1.6;';
  subQ.textContent=q.askQ;
  area.appendChild(subQ);
  renderMC(q,area);
}

// ══ MC ══
function renderMC(q,area){
  const grid=document.createElement('div');
  grid.className='opts';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'; btn.textContent=o;
    btn.addEventListener('click',()=>{
      if(S.answered)return;
      S.answered=true;
      clearInterval(S.timer);
      const ok=i===q.ans;
      grid.querySelectorAll('.opt').forEach((b,bi)=>{
        b.disabled=true;
        if(bi===q.ans)b.classList.add('ok');
        else if(bi===i&&!ok)b.classList.add('bad');
      });
      finish(ok,q);
    });
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

// ══ TF ══
function renderTF(q,area){
  const row=document.createElement('div');
  row.className='tf-row';
  ['⭕ 正確','❌ 錯誤'].forEach((label,i)=>{
    const btn=document.createElement('button');
    btn.className='tfbtn'; btn.innerHTML=label;
    btn.addEventListener('click',()=>{
      if(S.answered)return;
      S.answered=true;
      clearInterval(S.timer);
      const userT=i===0;
      const ok=userT===q.ans;
      row.querySelectorAll('.tfbtn').forEach((b,bi)=>{
        b.disabled=true;
        const bT=bi===0;
        if(bT===q.ans)b.classList.add('ok');
        else if(bT===userT&&!ok)b.classList.add('bad');
      });
      finish(ok,q);
    });
    row.appendChild(btn);
  });
  area.appendChild(row);
}

// ══ FILL ══
function renderFill(q,area){
  const row=document.createElement('div'); row.className='fill-row';
  const inp=document.createElement('input'); inp.className='fill-in'; inp.placeholder='輸入答案…';
  const btn=document.createElement('button'); btn.className='sub-btn'; btn.textContent='確認';
  const go=()=>{
    if(S.answered||!inp.value.trim())return;
    S.answered=true; clearInterval(S.timer);
    const val=inp.value.trim();
    const ok=val===q.ans||(q.alts&&q.alts.some(a=>val.includes(a)));
    inp.disabled=true; btn.disabled=true;
    inp.classList.add(ok?'ok':'bad');
    finish(ok,q,ok?null:`正確：${q.ans}`);
  };
  btn.addEventListener('click',go);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  row.append(inp,btn); area.appendChild(row);
}

// ══ MATCH ══
function renderMatch(q,area){
  const wrap=document.createElement('div'); wrap.className='match-wrap';
  const lCol=document.createElement('div'); lCol.className='match-col';
  const rCol=document.createElement('div'); rCol.className='match-col';
  const pairs=q.pairs;
  const shuffledR=shuffle([...pairs.map((p,i)=>({text:p[1],origIdx:i}))]);
  let lPicked=null,rPicked=null,matched=0;
  pairs.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='match-item'; el.textContent=p[0];
    el.dataset.idx=i; el.dataset.side='left';
    lCol.appendChild(el);
  });
  shuffledR.forEach(p=>{
    const el=document.createElement('div');
    el.className='match-item'; el.textContent=p.text;
    el.dataset.origIdx=p.origIdx; el.dataset.side='right';
    rCol.appendChild(el);
  });
  wrap.append(lCol,rCol); area.appendChild(wrap);
  function tryM(){
    if(!lPicked||!rPicked)return;
    const li=parseInt(lPicked.dataset.idx),ri=parseInt(rPicked.dataset.origIdx);
    if(li===ri){
      [lPicked,rPicked].forEach(el=>{el.classList.remove('selected');el.classList.add('matched','done');});
      matched++;
      if(matched===pairs.length){S.answered=true;clearInterval(S.timer);finish(true,q);}
    } else {
      [lPicked,rPicked].forEach(el=>el.classList.add('wrong-flash'));
      setTimeout(()=>{
        if(lPicked)lPicked.classList.remove('selected','wrong-flash');
        if(rPicked)rPicked.classList.remove('selected','wrong-flash');
        lPicked=null;rPicked=null;
      },600);
      return;
    }
    lPicked=null;rPicked=null;
  }
  wrap.addEventListener('click',e=>{
    if(S.answered)return;
    const item=e.target.closest('.match-item');
    if(!item||item.classList.contains('matched'))return;
    if(item.dataset.side==='left'){
      if(lPicked)lPicked.classList.remove('selected');
      lPicked=item;item.classList.add('selected');
    } else {
      if(rPicked)rPicked.classList.remove('selected');
      rPicked=item;item.classList.add('selected');
    }
    tryM();
  });
}

// ══ PIC ══
function renderPic(q,area){
  const sc=document.createElement('div'); sc.className='pic-scene';
  sc.innerHTML=SCENES[q.scene]||'';
  area.appendChild(sc);
  renderMC(q,area);
}

// ══ SORT ══
let dragEl=null;
function renderSort(q,area){
  const shuffled=shuffle([...q.items.keys()].map(i=>({i,text:q.items[i]})));
  const list=document.createElement('div'); list.className='sort-list';
  shuffled.forEach(item=>{
    const el=document.createElement('div');
    el.className='sort-item'; el.draggable=true; el.dataset.orig=item.i;
    el.innerHTML=`<span class="sort-handle">☰</span><span>${item.text}</span>`;
    el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragEl&&dragEl!==el){
        const all=[...list.querySelectorAll('.sort-item')];
        const si=all.indexOf(dragEl),ti=all.indexOf(el);
        if(si<ti)list.insertBefore(dragEl,el.nextSibling);
        else list.insertBefore(dragEl,el);
      }
    });
    list.appendChild(el);
  });
  area.appendChild(list);
  const chk=document.createElement('button'); chk.className='sort-check'; chk.textContent='確認順序 ✓';
  chk.addEventListener('click',()=>{
    if(S.answered)return;
    S.answered=true; clearInterval(S.timer);
    const order=[...list.querySelectorAll('.sort-item')].map(el=>+el.dataset.orig);
    finish(JSON.stringify(order)===JSON.stringify(q.correctOrder),q);
  });
  area.appendChild(chk);
}

// ══ FINISH ══
function finish(ok,q,extraMsg){
  const pts=calcPts(ok,q.type);
  if(ok){
    S.score+=pts; S.combo++;
    document.getElementById('gScore').textContent=`${S.score} 分`;
    if(S.combo>=3)showCombo(S.combo);
    // If in wrong practice and got it right, remove from bank
    if(S.isWrongPractice) removeFromWrongBank(q);
  } else {
    S.combo=0;
    if(S.mode==='survival') S.lives=Math.max(0,S.lives-1);
    S.wrong[q.era]=(S.wrong[q.era]||0)+1;
    // Save to wrong bank
    addToWrongBank(q);
  }

  // Show idiom box if question has idiom data
  if(q.idiom){
    const box=document.getElementById('idiomBox');
    document.getElementById('ibWord').textContent=q.idiom.word;
    document.getElementById('ibDef').textContent=q.idiom.def;
    document.getElementById('ibEx').textContent=q.idiom.ex||'';
    box.className='idiom-box show';
  }

  const fb=document.getElementById('fbbox');
  document.getElementById('fbtitle').textContent=ok?'✅ 答對了！':'❌ 答錯了';
  let msg=q.explain||'';
  if(extraMsg)msg=extraMsg+'　'+msg;
  document.getElementById('fbmsg').textContent=msg;
  fb.className=`fb-box show ${ok?'ok':'bad'}`;

  const nb=document.getElementById('nextBtn');
  nb.className='next-btn show';
  const isLast=S.cur+1>=S.qs.length;
  const isDead=S.mode==='survival'&&S.lives<=0;
  nb.textContent=(isLast||isDead)?'查看結果 →':'下一題 →';
  nb.onclick=()=>{
    S.cur++;
    if(S.cur>=S.qs.length||isDead)showResult();
    else renderQ();
  };
}

function calcPts(ok,type){
  if(!ok)return 0;
  const base={mc:5,tf:3,fill:6,match:8,pic:5,sort:7,fsy:6}[type]||5;
  const combo=S.combo>=4?3:S.combo>=2?1:0;
  const modeB=(S.mode==='blitz'||S.mode==='survival')?2:0;
  return base+combo+modeB;
}

// ══ TIMER ══
function startTimer(sec){
  S.tval=sec;
  const el=document.getElementById('gTimer');
  el.textContent=sec; el.className='gbar-timer';
  S.timer=setInterval(()=>{
    S.tval--; el.textContent=S.tval;
    if(S.tval<=3)el.className='gbar-timer hot';
    if(S.tval<=0){
      clearInterval(S.timer);
      if(!S.answered){
        S.answered=true; S.combo=0;
        const q=S.qs[S.cur];
        document.getElementById('fbtitle').textContent='⏰ 時間到！';
        document.getElementById('fbmsg').textContent=q.explain||'';
        document.getElementById('fbbox').className='fb-box show bad';
        document.querySelectorAll('.opt,.tfbtn,.fill-in,.sub-btn').forEach(b=>b.disabled=true);
        if(S.mode==='survival')S.lives=Math.max(0,S.lives-1);
        S.wrong[q.era]=(S.wrong[q.era]||0)+1;
        addToWrongBank(q);
        if(q.idiom){
          document.getElementById('ibWord').textContent=q.idiom.word;
          document.getElementById('ibDef').textContent=q.idiom.def;
          document.getElementById('ibEx').textContent=q.idiom.ex||'';
          document.getElementById('idiomBox').className='idiom-box show';
        }
        const nb=document.getElementById('nextBtn');
        nb.className='next-btn show';
        nb.textContent=S.cur+1>=S.qs.length?'查看結果 →':'下一題 →';
        nb.onclick=()=>{S.cur++;if(S.cur>=S.qs.length)showResult();else renderQ();};
      }
    }
  },1000);
}

// ══ COMBO ══
function showCombo(n){
  const el=document.getElementById('combo');
  el.textContent=`🔥 ${n}連勝！`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1200);
}

// ══ RESULT ══
function showResult(){
  clearInterval(S.timer);
  showScreen('result');
  const max=S.qs.length*6;
  const pct=max>0?S.score/max:0;
  let emoji,title,msg;
  if(pct>=.9){emoji='🏆';title='國文高手！';msg='你掌握了絕大多數的語文知識，繼續保持！';}
  else if(pct>=.7){emoji='🎯';title='表現優異！';msg='大部分都答對了，再針對弱點多複習幾遍。';}
  else if(pct>=.5){emoji='📖';title='加油！';msg='有些地方需要再看看，去錯題複習區加強練習！';}
  else{emoji='💪';title='繼續努力！';msg='把講義再仔細看一遍，然後針對錯題練習！';}
  document.getElementById('rEmoji').textContent=emoji;
  document.getElementById('rTitle').textContent=title;
  document.getElementById('rScore').textContent=S.score;
  document.getElementById('rMax').textContent=`滿分約 ${max} 分`;
  document.getElementById('rStars').textContent=pct>=.9?'⭐⭐⭐⭐⭐':pct>=.7?'⭐⭐⭐⭐':pct>=.5?'⭐⭐⭐':'⭐⭐';
  document.getElementById('rMsg').textContent=msg;
  const weakList=Object.entries(S.wrong).sort((a,b)=>b[1]-a[1]);
  if(weakList.length){
    document.getElementById('rWeak').style.display='block';
    document.getElementById('rWeakList').innerHTML=weakList.map(([k,v])=>`• ${k}（答錯${v}題）`).join('<br>');
  } else { document.getElementById('rWeak').style.display='none'; }
  const wrongCount=loadWrongBank().length;
  document.getElementById('rSaved').textContent=wrongCount>0?`📌 錯題庫目前共有 ${wrongCount} 題，可至錯題複習區加強練習`:'';
  if(pct>=.75)confetti();
}

// ══ WRONG PANEL ══
function renderWrongPanel(){
  const bank=loadWrongBank();
  const panel=document.getElementById('wrongPanel');
  const pwBtn=document.getElementById('practiceWrongBtn');
  const clBtn=document.getElementById('clearWrongBtn');

  if(!bank.length){
    panel.innerHTML=`<div class="empty-wrong">🎉 目前沒有錯題記錄！<br>繼續努力挑戰，答錯的題目會自動記錄在這裡。</div>`;
    pwBtn.style.display='none'; clBtn.style.display='none';
    return;
  }

  // Stats
  const totalWrong=bank.length;
  const topWrong=bank.sort((a,b)=>(b.wrongCount||1)-(a.wrongCount||1));

  panel.innerHTML=`
    <div class="wrong-summary">
      <h3>❌ 錯題統計</h3>
      <div class="wrong-stats">
        <div class="wstat"><div class="wnum">${totalWrong}</div><div class="wlbl">總錯題數</div></div>
        <div class="wstat"><div class="wnum" style="color:var(--gold);">${topWrong[0]?topWrong[0].wrongCount:0}</div><div class="wlbl">最多錯${topWrong[0]?'（'+topWrong[0].era+'）':''}</div></div>
      </div>
    </div>
    <div class="wrong-list">
      ${topWrong.map(q=>`
        <div class="wrong-item">
          <div class="wi-era">${q.era} · 答錯 ${q.wrongCount||1} 次</div>
          <div class="wi-q">${q.q}</div>
          <div class="wi-ans">✓ ${q.type==='tf'?(q.ans?'正確':'錯誤'):(q.opts?q.opts[q.ans]:q.ans||'')}</div>
        </div>
      `).join('')}
    </div>`;
  pwBtn.style.display='block';
  clBtn.style.display='block';
}

function clearWrong(){
  if(confirm('確定要清除所有錯題記錄嗎？')){
    saveWrongBank([]);
    renderWrongPanel();
  }
}

// ══ UTILS ══
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function confetti(){
  const cols=['#e8a020','#c0392b','#1a7a6e','#1a4a7a','#fef9f0'];
  for(let i=0;i<45;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cf';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.2)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3000);
    },i*35);
  }
}
function restart(){ startGame(); }
function goHome(){ showScreen('home'); }
function goWrong(){
  showScreen('home');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-panel="wrong"]').classList.add('active');
  document.getElementById('panel-wrong').classList.add('active');
  renderWrongPanel();
}
</script>
