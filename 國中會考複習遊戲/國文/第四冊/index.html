<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國文闖關王 第四冊</title>
<style>
:root{
  --bg:#faf0ff;--ink:#1a0a2a;--red:#c0392b;--gold:#e8a020;
  --teal:#7b2fbe;--blue:#4a1a7a;--pink:#c0396b;--purple:#9b59b6;
  --green:#1a7a3a;--card:#ffffff;--shadow:rgba(123,47,190,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Microsoft JhengHei','微軟正黑體',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 25%,rgba(123,47,190,.08) 0%,transparent 70%),
  radial-gradient(ellipse 50% 50% at 85% 75%,rgba(92,42,131,.06) 0%,transparent 70%);pointer-events:none;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

#home{padding:24px 16px;justify-content:flex-start;background:linear-gradient(155deg,#ede0ff 0%,#faf0ff 60%);}
.brush-title{font-size:clamp(1.6rem,6.5vw,2.8rem);font-weight:900;color:var(--ink);letter-spacing:.12em;position:relative;display:inline-block;padding:0 10px;}
.brush-title::before,.brush-title::after{content:'';position:absolute;height:4px;width:36%;background:var(--teal);bottom:-5px;border-radius:2px;}
.brush-title::before{left:0;}.brush-title::after{right:0;}
.home-badge{display:inline-block;background:var(--teal);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:.1em;margin-top:10px;}
.home-header{text-align:center;margin-bottom:18px;width:100%;}

.nav-tabs{display:flex;gap:6px;width:100%;max-width:660px;margin-bottom:16px;border-bottom:2px solid rgba(26,10,42,.1);padding-bottom:0;}
.nav-tab{padding:8px 16px;font-weight:700;font-size:.85rem;color:rgba(26,10,42,.42);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-panel{display:none;width:100%;max-width:660px;}
.tab-panel.active{display:block;}

.slabel{font-size:.7rem;letter-spacing:.18em;color:rgba(26,10,42,.38);margin-bottom:8px;margin-top:14px;}
.topic-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.tchip{padding:6px 13px;border-radius:17px;border:1.5px solid rgba(26,10,42,.18);background:white;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--ink);user-select:none;}
.tchip.on{background:var(--teal);border-color:var(--teal);color:white;font-weight:700;}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:4px;}
@media(max-width:400px){.mode-grid{grid-template-columns:1fr;}}
.mcard{background:white;border:2px solid rgba(26,10,42,.1);border-radius:13px;padding:15px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.mcard:hover{transform:translateY(-2px);box-shadow:0 5px 16px var(--shadow);}
.mcard.picked{border-color:var(--teal);background:#f0e8ff;}
.mcard .micon{font-size:1.7rem;display:block;margin-bottom:6px;}
.mcard .mtitle{font-weight:900;font-size:.92rem;color:var(--ink);}
.mcard .mdesc{font-size:.7rem;color:rgba(26,10,42,.48);margin-top:3px;line-height:1.4;}

.go-btn{background:var(--teal);color:white;border:none;border-radius:12px;padding:14px 0;font-size:1rem;font-weight:900;letter-spacing:.12em;cursor:pointer;margin-top:16px;transition:all .2s;box-shadow:0 4px 14px rgba(123,47,190,.3);width:100%;max-width:660px;}
.go-btn:hover:not(:disabled){transform:translateY(-2px);}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}

.qty-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
.qty-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--teal);background:white;color:var(--teal);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-val{font-weight:700;font-size:1rem;min-width:28px;text-align:center;}

#game{padding:0;background:var(--bg);}
.gbar{width:100%;background:white;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px var(--shadow);position:sticky;top:0;z-index:10;}
.gbar-left{flex:1;display:flex;flex-direction:column;gap:3px;}
.prog-track{height:5px;background:#e8e0f0;border-radius:3px;overflow:hidden;width:100%;}
.prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s;}
#gInfo{font-size:.72rem;color:rgba(26,10,42,.5);font-weight:600;}
#gScore{font-size:1rem;font-weight:900;color:var(--teal);white-space:nowrap;}
#gLives{font-size:.85rem;white-space:nowrap;}
#gTimer{font-size:.85rem;font-weight:700;color:var(--red);min-width:32px;text-align:right;}

.qwrap{width:100%;max-width:660px;padding:16px;}
.qcard{background:white;border-radius:16px;padding:20px 18px;box-shadow:0 3px 14px var(--shadow);margin-bottom:14px;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--teal);border-radius:5px 0 0 5px;}
.qtag{display:inline-block;background:#f0e8ff;color:var(--teal);font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:10px;margin-bottom:10px;letter-spacing:.06em;}
.qera{font-size:.72rem;color:rgba(26,10,42,.4);margin-bottom:6px;}
.qtext{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:4px;}

/* FSY */
.fsy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.fsy-card{background:linear-gradient(135deg,#f0e8ff,#faf0ff);border:1.5px solid rgba(123,47,190,.15);border-radius:12px;padding:12px 8px;text-align:center;}
.fsy-char{font-size:2rem;font-weight:900;color:var(--teal);}
.fsy-ping{font-size:.75rem;color:var(--purple);margin:2px 0;}
.fsy-def{font-size:.68rem;color:rgba(26,10,42,.55);line-height:1.3;}
.fsy-ex{font-size:.65rem;color:rgba(123,47,190,.6);margin-top:3px;}
.fsy-ask{font-size:.88rem;font-weight:700;color:var(--ink);margin:12px 0 8px;line-height:1.5;}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.opt{background:#f8f3ff;border:2px solid rgba(26,10,42,.08);border-radius:11px;padding:11px 14px;cursor:pointer;font-size:.9rem;color:var(--ink);transition:all .18s;text-align:left;font-weight:500;}
.opt:hover{border-color:var(--teal);background:#ede0ff;}
.opt.correct{border-color:#27ae60;background:#e8f8e8;color:#1a5c30;font-weight:700;}
.opt.wrong{border-color:var(--red);background:#fde8e8;color:#7a1a1a;font-weight:700;}
.opt:disabled{cursor:not-allowed;}

/* TF */
.tf-row{display:flex;gap:12px;margin-top:12px;}
.tf-btn{flex:1;padding:14px;border-radius:11px;border:2px solid rgba(26,10,42,.1);background:#f8f3ff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .18s;}
.tf-btn:hover{border-color:var(--teal);}
.tf-btn.correct{border-color:#27ae60;background:#e8f8e8;color:#1a5c30;}
.tf-btn.wrong{border-color:var(--red);background:#fde8e8;color:#7a1a1a;}

/* Fill */
.fill-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.fill-input{flex:1;border:2px solid rgba(123,47,190,.25);border-radius:10px;padding:10px 13px;font-size:1rem;font-family:inherit;outline:none;transition:border .2s;}
.fill-input:focus{border-color:var(--teal);}
.fill-input.correct{border-color:#27ae60;background:#e8f8e8;}
.fill-input.wrong{border-color:var(--red);background:#fde8e8;}
.fill-submit{background:var(--teal);color:white;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* Match */
.match-area{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{background:#f8f3ff;border:2px solid rgba(26,10,42,.08);border-radius:10px;padding:9px 12px;font-size:.88rem;cursor:pointer;transition:all .18s;text-align:center;}
.match-item.selected{border-color:var(--teal);background:#ede0ff;}
.match-item.matched{border-color:#27ae60;background:#e8f8e8;cursor:default;}
.match-item.wrong-flash{border-color:var(--red);background:#fde8e8;}
.match-line{font-size:.8rem;color:rgba(26,10,42,.35);text-align:center;padding:4px;}

/* Sort */
.sort-area{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.sort-item{background:#f8f3ff;border:2px solid rgba(26,10,42,.08);border-radius:10px;padding:10px 13px;font-size:.85rem;cursor:grab;display:flex;align-items:center;gap:8px;transition:all .18s;}
.sort-item:active{cursor:grabbing;opacity:.7;}
.sort-item.dragging{opacity:.4;}
.sort-handle{color:rgba(123,47,190,.35);font-size:1rem;}
.sort-check{background:var(--teal);color:white;border:none;border-radius:9px;padding:9px 16px;font-weight:700;cursor:pointer;margin-top:8px;width:100%;}

/* Explain */
.explain-box{background:#f0e8ff;border-left:3px solid var(--teal);border-radius:0 10px 10px 0;padding:10px 13px;margin-top:12px;font-size:.82rem;color:rgba(26,10,42,.7);line-height:1.6;}
.next-btn{background:var(--teal);color:white;border:none;border-radius:11px;padding:12px 0;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:10px;width:100%;box-shadow:0 3px 10px rgba(123,47,190,.3);}

/* Wrong panel */
.empty-wrong{text-align:center;padding:30px;color:rgba(26,10,42,.4);font-size:.9rem;line-height:1.8;}
.wrong-summary{background:white;border-radius:13px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);}
.wrong-summary h3{font-size:.95rem;color:var(--ink);margin-bottom:10px;}
.wrong-stats{display:flex;gap:16px;}
.wstat{text-align:center;}
.wnum{font-size:1.4rem;font-weight:900;color:var(--teal);}
.wlbl{font-size:.7rem;color:rgba(26,10,42,.45);}
.wrong-list{display:flex;flex-direction:column;gap:8px;}
.wrong-item{background:white;border-radius:11px;padding:13px;box-shadow:0 2px 6px var(--shadow);}
.wi-era{font-size:.68rem;color:var(--teal);font-weight:700;margin-bottom:4px;}
.wi-q{font-size:.85rem;color:var(--ink);margin-bottom:4px;}
.wi-ans{font-size:.78rem;color:#27ae60;font-weight:600;}
.wrong-actions{display:flex;gap:8px;margin-top:12px;}
.wrong-actions button{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:.85rem;}
#practiceWrongBtn{background:var(--teal);color:white;}
#clearWrongBtn{background:#fde8e8;color:var(--red);}

/* Result */
#result{padding:24px 16px;justify-content:center;background:linear-gradient(155deg,#ede0ff 0%,#faf0ff 60%);}
.result-card{background:white;border-radius:20px;padding:28px 22px;max-width:480px;width:100%;box-shadow:0 6px 24px var(--shadow);text-align:center;}
.result-emoji{font-size:3.2rem;margin-bottom:8px;}
.result-title{font-size:1.4rem;font-weight:900;color:var(--ink);margin-bottom:4px;}
.result-score{font-size:2.8rem;font-weight:900;color:var(--teal);margin:10px 0;}
.result-detail{font-size:.82rem;color:rgba(26,10,42,.5);margin-bottom:16px;line-height:1.7;}
#rSaved{font-size:.78rem;color:var(--purple);margin-bottom:10px;min-height:20px;}
.result-btns{display:flex;gap:8px;flex-wrap:wrap;}
.result-btns button{flex:1;min-width:120px;padding:12px;border-radius:11px;border:none;font-weight:700;cursor:pointer;font-size:.88rem;}
#restartBtn{background:var(--teal);color:white;}
#homeBtn2{background:#f0e8ff;color:var(--teal);}
#goWrongBtn{background:#fde8e8;color:var(--red);}

/* Combo */
.combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--teal);color:white;border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;z-index:100;pointer-events:none;animation:comboPop .6s ease forwards;}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}60%{transform:translate(-50%,-50%) scale(1.2);}100%{transform:translate(-50%,-50%) scale(0);opacity:0;}}
.cf{position:fixed;top:-10px;width:10px;height:10px;border-radius:50%;animation:fall linear forwards;z-index:200;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="brush-title">國文闖關王</div>
    <div class="home-badge">第四冊・紫韻版</div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" data-panel="play">🎮 開始遊戲</div>
    <div class="nav-tab" data-panel="wrong">❌ 錯題複習</div>
  </div>

  <!-- 開始遊戲 tab -->
  <div class="tab-panel active" id="panel-play">
    <div class="slabel">選擇主題</div>
    <div class="topic-row">
      <div class="tchip on" data-t="fsy">🔤 形音義辨析</div>
      <div class="tchip on" data-t="lesson">📖 課文重點</div>
      <div class="tchip on" data-t="letter">✉️ 應用文</div>
      <div class="tchip on" data-t="tici">🎊 題辭賀詞</div>
      <div class="tchip on" data-t="idiom">🌸 成語詞語</div>
      <div class="tchip on" data-t="rhetoric">🎭 修辭法</div>
      <div class="tchip on" data-t="novel">📚 中國小說</div>
      <div class="tchip on" data-t="xiehouyu">😄 歇後語</div>
      <div class="tchip on" data-t="sort">🔢 文意排序</div>
    </div>

    <div class="slabel">選擇模式</div>
    <div class="mode-grid">
      <div class="mcard picked" data-m="normal">
        <span class="micon">📝</span>
        <div class="mtitle">練習模式</div>
        <div class="mdesc">不限時，答完顯示解析</div>
      </div>
      <div class="mcard" data-m="timed">
        <span class="micon">⏱️</span>
        <div class="mtitle">限時模式</div>
        <div class="mdesc">每題20秒，速度是關鍵</div>
      </div>
      <div class="mcard" data-m="blitz">
        <span class="micon">⚡</span>
        <div class="mtitle">閃電模式</div>
        <div class="mdesc">倒數60秒，搶答到底</div>
      </div>
      <div class="mcard" data-m="survival">
        <span class="micon">❤️</span>
        <div class="mtitle">生存模式</div>
        <div class="mdesc">只有3條命，答錯就扣</div>
      </div>
    </div>

    <div class="slabel">題數設定</div>
    <div class="qty-row">
      <button class="qty-btn" id="qtyMinus">－</button>
      <span class="qty-val" id="qtyVal">10</span>
      <button class="qty-btn" id="qtyPlus">＋</button>
      <span style="font-size:.78rem;color:rgba(26,10,42,.4);">題（隨機抽題）</span>
    </div>

    <button class="go-btn" id="goBtn">開始闖關 ▶</button>
  </div>

  <!-- 錯題複習 tab -->
  <div class="tab-panel" id="panel-wrong">
    <div id="wrongPanel" style="margin-top:8px;"></div>
    <div class="wrong-actions">
      <button id="practiceWrongBtn" style="display:none;" onclick="startWrongPractice()">練習錯題</button>
      <button id="clearWrongBtn" style="display:none;" onclick="clearWrong()">清除記錄</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="gbar">
    <div class="gbar-left">
      <div id="gInfo">第 1 / 10 題</div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <span id="gScore">0 分</span>
    <span id="gLives"></span>
    <span id="gTimer"></span>
  </div>
  <div class="qwrap" id="qwrap"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-card">
    <div class="result-emoji" id="rEmoji">🎉</div>
    <div class="result-title" id="rTitle">闖關完成！</div>
    <div class="result-score" id="rScore">0 分</div>
    <div class="result-detail" id="rDetail"></div>
    <div id="rSaved"></div>
    <div class="result-btns">
      <button id="restartBtn" onclick="restart()">再玩一次</button>
      <button id="homeBtn2" onclick="goHome()">回首頁</button>
      <button id="goWrongBtn" onclick="goWrong()">錯題複習</button>
    </div>
  </div>
</div>

<script>
const QB=[
// ── 形音義辨析 ────────────────────────────────────────────
{t:'fsy',era:'形音義・蒼/倉/滄',type:'fsy',
 q:'辨認形近字：',
 chars:[
   {char:'蒼',ping:'cāng',def:'蒼白、蒼茫',ex:'蒼天、蒼白'},
   {char:'倉',ping:'cāng',def:'倉庫、倉促',ex:'倉庫、倉皇'},
   {char:'滄',ping:'cāng',def:'滄海、滄桑',ex:'滄海、滄桑'},
 ],
 askQ:'「___海桑田，世事難料」應填入哪個字？',
 opts:['蒼（天空）','倉（庫房）','滄（大海）','倡（提倡）'],ans:2,
 explain:'「滄海桑田」的「滄」有三點水，指大海；比喻世事變化之大。'},
{t:'fsy',era:'形音義・峻/竣/俊',type:'fsy',
 q:'辨認形近字：',
 chars:[
   {char:'峻',ping:'jùn',def:'嚴峻、陡峻',ex:'嚴峻、峻嶺'},
   {char:'竣',ping:'jùn',def:'竣工、完竣',ex:'竣工、竣事'},
   {char:'俊',ping:'jùn',def:'英俊、俊秀',ex:'英俊、俊美'},
 ],
 askQ:'「這項工程歷時三年終於___工，如期完成」應填入哪個字？',
 opts:['峻（嚴峻）','竣（完工）','俊（英俊）','峰（山峰）'],ans:1,
 explain:'「竣工」的「竣」意指工程完成，注意「竣」有「立」字旁，代表站立完成之意。'},
{t:'fsy',era:'形音義・惻/側/廁',type:'fsy',
 q:'辨認形近字：',
 chars:[
   {char:'惻',ping:'cè',def:'惻隱、惻然',ex:'惻隱之心、惻然'},
   {char:'側',ping:'cè',def:'側面、旁側',ex:'側面、側邊'},
   {char:'廁',ping:'cè',def:'廁所、廁身',ex:'廁所、廁身其中'},
 ],
 askQ:'「看到受傷的小動物，心中升起___隱之心」應填哪字？',
 opts:['惻（憐憫）','側（旁邊）','廁（廁所）','測（測量）'],ans:0,
 explain:'「惻隱」的「惻」是心字旁，表示心中憐憫不忍的情感，即孟子所說的「不忍之心」。'},
{t:'fsy',era:'形音義・漿/槳/獎',type:'fsy',
 q:'辨認形近字：',
 chars:[
   {char:'漿',ping:'jiāng',def:'豆漿、漿糊',ex:'豆漿、漿糊'},
   {char:'槳',ping:'jiǎng',def:'木槳、划槳',ex:'船槳、划槳'},
   {char:'獎',ping:'jiǎng',def:'獎勵、獎金',ex:'獎品、獎狀'},
 ],
 askQ:'「他手持___板，奮力划向對岸」應填入哪個字？',
 opts:['漿（豆漿）','槳（划船）','獎（獎勵）','醬（醬料）'],ans:1,
 explain:'「槳」是木製划船工具，有「木」字旁；與「漿」（液體）、「獎」（獎勵）字形相近但意義不同。'},
{t:'fsy',era:'形音義・籠/攏/壟',type:'fsy',
 q:'辨認形近字：',
 chars:[
   {char:'籠',ping:'lóng',def:'籠罩、鳥籠',ex:'籠罩、籠統'},
   {char:'攏',ping:'lǒng',def:'收攏、聚攏',ex:'收攏、靠攏'},
   {char:'壟',ping:'lǒng',def:'壟斷、田壟',ex:'壟斷、壟溝'},
 ],

// ── 修辭法 ────────────────────────────────────────────
{t:'rhetoric',era:'修辭・明喻',type:'mc',

 opts:['暗喻','明喻','借喻','擬人'],ans:1,
 explain:'這句話用「如……般」連接，清楚表達本體（笑容）和喻體（春天的陽光），屬於「明喻」。明喻有明顯的比喻詞（如、像、似）。'},
{t:'rhetoric',era:'修辭・暗喻',type:'mc',
 q:'「時間是一把無情的剪刀，剪去了青春的年華」，這句話使用了哪種修辭法？',
 opts:['明喻','借喻','暗喻','誇飾'],ans:2,
 explain:'這句話用「是」連接本體（時間）和喻體（剪刀），沒有「如、像」等明喻詞，屬於「暗喻」（隱喻）。'},
{t:'rhetoric',era:'修辭・誇飾',type:'mc',
 q:'「飛流直下三千尺，疑是銀河落九天」，這句詩使用的修辭法是？',
 opts:['比喻','頂真','誇飾','對偶'],ans:2,
 explain:'「三千尺」、「銀河落九天」為誇大的描寫，屬於「誇飾」（誇張）修辭，用以強調瀑布的壯觀與高度。'},
{t:'rhetoric',era:'修辭・頂真',type:'mc',
 q:'「春風吹，吹綠了大地；大地染，染紅了山花」，這段文字使用了哪種修辭法？',
 opts:['排比','頂真','回文','對偶'],ans:1,
 explain:'「頂真」是前一句的末尾詞語作為下一句的開頭，如「吹綠了大地；大地染」，前後句首尾相接，形成連貫的節奏。'},
{t:'rhetoric',era:'修辭・排比',type:'mc',
 q:'「我愛祖國的山，我愛祖國的水，我愛祖國的每一寸土地」，這段文字用了什麼修辭法？',
 opts:['頂真','對偶','排比','設問'],ans:2,
 explain:'「排比」是用三個以上結構相同或相似的句式，表達相關的多個意思，增強語氣和節奏感。此三句均以「我愛祖國的」開頭。'},
{t:'rhetoric',era:'修辭・擬人',type:'mc',
 q:'「小草害羞地低著頭，不敢接受太陽的讚美」，這句話使用了哪種修辭法？',
 opts:['比喻','擬人','誇飾','借代'],ans:1,
 explain:'「擬人」是把無生命的事物當作有人的動作或感情來描寫，如「害羞地低著頭」是人的行為，賦予小草人的特質。'},
{t:'rhetoric',era:'修辭・反問',type:'mc',

 explain:'「反問」是用問句形式表達肯定的意思，不需要回答，以強調語氣；「設問」則是自問自答。「難道……嗎？」是反問句型。'},
{t:'rhetoric',era:'修辭・對偶',type:'mc',

 opts:['排比','頂真','對偶','借喻'],ans:2,
 explain:'「對偶」是兩句字數相同、詞性相對、意義相關的句子。「春蠶/蠟炬」、「到死/成灰」、「絲方盡/淚始乾」兩兩相對。'},
{t:'rhetoric',era:'修辭・借代',type:'mc',

 opts:['白色的頭髮本身','老年時光','年輕時的記憶','努力的象徵'],ans:1,
 explain:'「借代」是用某事物的特徵代替事物本身，「白髮」是老年人的特徵，這裡用「白髮」代指「老年時光」。'},
{t:'rhetoric',era:'修辭・綜合辨析',type:'mc',

// ── State ───────────────────────────────────────────
const WB_KEY='cw4_wrong_v1';
let S={qs:[],cur:0,score:0,combo:0,mode:'normal',lives:3,timer:null,timeLeft:0,blitzLeft:60,answered:false,isWP:false};
let qtyTarget=10,selTopics=new Set(QB.map(q=>q.t)),selMode='normal';

function loadWB(){try{return JSON.parse(localStorage.getItem(WB_KEY)||'[]');}catch{return[];}}
function saveWB(a){localStorage.setItem(WB_KEY,JSON.stringify(a));}
function addWrong(q){
  const bank=loadWB();const idx=bank.findIndex(x=>x.era===q.era&&x.q===q.q);
  if(idx>=0){bank[idx].wrongCount=(bank[idx].wrongCount||1)+1;}
  else{bank.push({...q,wrongCount:1});}
  saveWB(bank);
}
function removeWrong(q){const bank=loadWB().filter(x=>!(x.era===q.era&&x.q===q.q));saveWB(bank);}

// ── Init ────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
    if(tab.dataset.panel==='wrong')renderWP();
  });
});
document.querySelectorAll('.tchip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    chip.classList.toggle('on');
    if(chip.classList.contains('on'))selTopics.add(chip.dataset.t);
    else selTopics.delete(chip.dataset.t);
    updateGoBtn();
  });
});
document.querySelectorAll('.mcard').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.mcard').forEach(c=>c.classList.remove('picked'));
    card.classList.add('picked');selMode=card.dataset.m;
  });
});
let qty=10;
document.getElementById('qtyMinus').addEventListener('click',()=>{qty=Math.max(5,qty-5);document.getElementById('qtyVal').textContent=qty;});
document.getElementById('qtyPlus').addEventListener('click',()=>{qty=Math.min(50,qty+5);document.getElementById('qtyVal').textContent=qty;});
document.getElementById('goBtn').addEventListener('click',()=>startGame());
function updateGoBtn(){document.getElementById('goBtn').disabled=selTopics.size===0;}

function startGame(fromWrong=false){
  let pool;
  if(fromWrong){
    pool=[...loadWB()];S.isWP=true;
  } else {
    pool=QB.filter(q=>selTopics.has(q.t));S.isWP=false;
  }
  if(!pool.length)return;
  shuffle(pool);
  S.qs=pool.slice(0,fromWrong?pool.length:qty);
  S.cur=0;S.score=0;S.combo=0;S.mode=fromWrong?'normal':selMode;S.lives=3;S.answered=false;
  clearInterval(S.timer);
  showScreen('game');
  renderQ();
  if(S.mode==='blitz'){S.blitzLeft=60;startBlitz();}
}
function startWrongPractice(){startGame(true);}

function startTimer(){
  S.timeLeft=20;document.getElementById('gTimer').textContent='20s';
  S.timer=setInterval(()=>{
    S.timeLeft--;document.getElementById('gTimer').textContent=S.timeLeft+'s';
    if(S.timeLeft<=0){clearInterval(S.timer);if(!S.answered)autoFail();}
  },1000);
}
function startBlitz(){
  document.getElementById('gTimer').textContent=S.blitzLeft+'s';
  S.timer=setInterval(()=>{
    S.blitzLeft--;document.getElementById('gTimer').textContent=S.blitzLeft+'s';
    if(S.blitzLeft<=0){clearInterval(S.timer);finish();}
  },1000);
}
function autoFail(){
  S.answered=true;S.combo=0;
  const q=S.qs[S.cur];
  if(S.mode==='survival'){S.lives--;if(S.lives<=0){clearInterval(S.timer);setTimeout(finish,900);return;}}
  if(q.type==='mc'||q.type==='fsy'){
    document.querySelectorAll('.opt').forEach((o,i)=>{o.disabled=true;if(i===q.ans)o.classList.add('correct');});
  } else if(q.type==='tf'){
    document.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=true;if((b.dataset.val==='true')===q.ans)b.classList.add('correct');});
  }
  showExplain(q);addWrong(q);
}

function renderQ(){
  if(S.cur>=S.qs.length){showResult();return;}
  const q=S.qs[S.cur];S.answered=false;
  const total=S.qs.length;
  document.getElementById('gInfo').textContent=`第 ${S.cur+1} / ${total} 題${S.isWP?' 📌錯題':''}`;
  document.getElementById('progFill').style.width=`${(S.cur/total)*100}%`;
  document.getElementById('gScore').textContent=`${S.score} 分`;
  if(S.mode==='survival')document.getElementById('gLives').textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));
  else document.getElementById('gLives').textContent='';
  const tMap={mc:'選擇題',tf:'是非題',fill:'填空題',match:'連連看',sort:'排序題',fsy:'形音義辨析'};
  if(S.mode==='timed'){clearInterval(S.timer);startTimer();}
  if(S.mode!=='blitz')document.getElementById('gTimer').textContent='';

  const wrap=document.getElementById('qwrap');
  wrap.innerHTML=`<div class="qcard"><span class="qtag" id="qtag">${tMap[q.type]||'題目'}</span><div class="qera">${q.era}</div><div class="qtext">${q.q}</div><div id="qbody"></div></div>`;

  if(q.type==='fsy')renderFSY(q);
  else if(q.type==='mc')renderMC(q);
  else if(q.type==='tf')renderTF(q);
  else if(q.type==='fill')renderFill(q);
  else if(q.type==='match')renderMatch(q);
  else if(q.type==='sort')renderSort(q);
}

function renderFSY(q){
  const body=document.getElementById('qbody');
  body.innerHTML=`<div class="fsy-grid">${q.chars.map(c=>`<div class="fsy-card"><div class="fsy-char">${c.char}</div><div class="fsy-ping">${c.ping}</div><div class="fsy-def">${c.def}</div><div class="fsy-ex">${c.ex}</div></div>`).join('')}</div><div class="fsy-ask">${q.askQ}</div><div class="opts" id="opts"></div>`;
  renderMCOpts(q);
}
function renderMC(q){
  const body=document.getElementById('qbody');
  body.innerHTML=`<div class="opts" id="opts"></div>`;
  renderMCOpts(q);
}
function renderMCOpts(q){
  const opts=document.getElementById('opts');
  opts.innerHTML=q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('');
  opts.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(S.answered)return;S.answered=true;
      clearInterval(S.mode==='timed'?S.timer:null);
      const i=+btn.dataset.i;const correct=i===q.ans;
      btn.classList.add(correct?'correct':'wrong');
      opts.querySelectorAll('.opt').forEach(b=>b.disabled=true);
      if(!correct){opts.querySelectorAll('.opt')[q.ans].classList.add('correct');addWrong(q);}
      handleScore(correct,q);
      showExplain(q);
    });
  });
}
function renderTF(q){
  const body=document.getElementById('qbody');
  body.innerHTML=`<div class="tf-row"><button class="tf-btn" data-val="true">⭕ 正確</button><button class="tf-btn" data-val="false">❌ 錯誤</button></div>`;
  body.querySelectorAll('.tf-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(S.answered)return;S.answered=true;
      clearInterval(S.mode==='timed'?S.timer:null);
      const val=btn.dataset.val==='true';const correct=val===q.ans;
      btn.classList.add(correct?'correct':'wrong');
      body.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=true;if((b.dataset.val==='true')===q.ans)b.classList.add('correct');});
      if(!correct)addWrong(q);
      handleScore(correct,q);showExplain(q);
    });
  });
}
function renderFill(q){
  const body=document.getElementById('qbody');
  body.innerHTML=`<div class="fill-row"><input class="fill-input" id="fillInp" placeholder="請輸入答案…" autocomplete="off"><button class="fill-submit" id="fillBtn">確認</button></div>`;
  const inp=document.getElementById('fillInp');const btn=document.getElementById('fillBtn');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
  btn.addEventListener('click',()=>{
    if(S.answered)return;
    const val=inp.value.trim();if(!val)return;
    S.answered=true;clearInterval(S.mode==='timed'?S.timer:null);
    const correct=val===q.ans||val.replace(/\s/g,'')===(q.ans+'').replace(/\s/g,'');
    inp.classList.add(correct?'correct':'wrong');btn.disabled=true;inp.disabled=true;
    if(!correct){addWrong(q);const hint=document.createElement('div');hint.style.cssText='font-size:.82rem;color:#c0392b;margin-top:6px;';hint.textContent='正確答案：'+q.ans;body.appendChild(hint);}
    handleScore(correct,q);showExplain(q);
  });
}
function renderMatch(q){
  const body=document.getElementById('qbody');
  const pairs=q.pairs;const shuffledB=[...pairs.map(p=>p.b)];shuffle(shuffledB);
  body.innerHTML=`<div class="match-area"><div class="match-col" id="colA">${pairs.map((p,i)=>`<div class="match-item" data-ai="${i}">${p.a}</div>`).join('')}</div><div class="match-col" id="colB">${shuffledB.map((b,i)=>`<div class="match-item" data-bi="${i}" data-bval="${b}">${b}</div>`).join('')}</div></div>`;
  let selA=null,matched=0;
  body.querySelectorAll('[data-ai]').forEach(el=>{el.addEventListener('click',()=>{if(el.classList.contains('matched'))return;body.querySelectorAll('[data-ai]').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selA=el;});});
  body.querySelectorAll('[data-bval]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(!selA||el.classList.contains('matched'))return;
      const ai=+selA.dataset.ai;const correct=el.dataset.bval===pairs[ai].b;
      if(correct){selA.classList.remove('selected');selA.classList.add('matched');el.classList.add('matched');selA=null;matched++;
        if(matched===pairs.length){S.answered=true;handleScore(true,q);showExplain(q);}
      } else {
        el.classList.add('wrong-flash');setTimeout(()=>el.classList.remove('wrong-flash'),500);
        S.combo=0;addWrong(q);
      }
    });
  });
}
function renderSort(q){
  const body=document.getElementById('qbody');
  let order=[...Array(q.items.length).keys()];shuffle(order);
  let displayItems=order.map(i=>({orig:i,text:q.items[i]}));
  function renderItems(){
    const area=document.getElementById('sortArea');
    area.innerHTML=displayItems.map((item,pos)=>`<div class="sort-item" draggable="true" data-pos="${pos}"><span class="sort-handle">☰</span><span>${item.text}</span></div>`).join('');
    area.querySelectorAll('.sort-item').forEach(el=>{
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.pos);el.classList.add('dragging');});
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
      el.addEventListener('dragover',e=>e.preventDefault());
      el.addEventListener('drop',e=>{
        e.preventDefault();const from=+e.dataTransfer.getData('text/plain');const to=+el.dataset.pos;
        if(from===to)return;const tmp=displayItems[from];displayItems[from]=displayItems[to];displayItems[to]=tmp;renderItems();
      });
    });
  }
  body.innerHTML=`<div class="sort-area" id="sortArea"></div><button class="sort-check" id="sortCheck">確認順序</button>`;
  renderItems();
  document.getElementById('sortCheck').addEventListener('click',()=>{
    if(S.answered)return;S.answered=true;
    const userOrder=displayItems.map(item=>item.orig);
    const correct=userOrder.every((v,i)=>v===q.ans[i]);
    if(!correct)addWrong(q);
    handleScore(correct,q);showExplain(q);
  });
}

function showExplain(q){
  const qcard=document.querySelector('.qcard');
  if(!qcard)return;
  const box=document.createElement('div');box.className='explain-box';box.textContent='📝 '+q.explain;
  const nbtn=document.createElement('button');nbtn.className='next-btn';
  nbtn.textContent=S.cur+1>=S.qs.length?'查看結果 🎉':'下一題 ▶';
  nbtn.addEventListener('click',()=>{S.cur++;renderQ();});
  qcard.appendChild(box);qcard.appendChild(nbtn);
}

function handleScore(correct,q){
  clearInterval(S.mode==='timed'?S.timer:null);
  if(correct){
    S.combo++;const pts=calcPts();S.score+=pts;
    if(S.combo>=3){const pop=document.createElement('div');pop.className='combo-pop';pop.textContent=`COMBO\n×${S.combo}`;document.body.appendChild(pop);setTimeout(()=>pop.remove(),700);}
    if(S.isWP)removeWrong(q);
  } else {
    S.combo=0;
    if(S.mode==='survival'){S.lives--;if(S.lives<=0){S.answered=true;clearInterval(S.timer);setTimeout(finish,900);}}
  }
  document.getElementById('gScore').textContent=`${S.score} 分`;
  if(S.mode==='survival')document.getElementById('gLives').textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));
}
function calcPts(){
  const base=S.mode==='timed'?Math.max(5,S.timeLeft*5):10;
  const combo=S.combo>=5?2:S.combo>=3?1.5:1;
  return Math.round(base*combo);
}

function finish(){showResult();}
function showResult(){
  clearInterval(S.timer);
  const total=S.qs.length;const pct=total?S.score/(total*(S.mode==='timed'?100:10)):0;
  const grade=pct>=.9?['🏆','超級英雄！']:pct>=.75?['🌟','太厲害了！']:pct>=.6?['👍','表現不錯！']:pct>=.4?['📚','繼續加油！']:['💪','再接再厲！'];
  document.getElementById('rEmoji').textContent=grade[0];
  document.getElementById('rTitle').textContent=grade[1];
  document.getElementById('rScore').textContent=S.score+' 分';
  document.getElementById('rDetail').textContent=`共 ${total} 題・答對 ${S.qs.filter((_,i)=>i<S.cur).length>0?'':''} ${Math.round(pct*100)}%・最高連擊 ${S.combo}`;
  showScreen('result');
  const wc=loadWB().length;document.getElementById('rSaved').textContent=wc>0?`📌 錯題庫共有 ${wc} 題，可至錯題複習區加強練習`:'';
  if(pct>=.75)confetti();
}

function renderWP(){
  const bank=loadWB();const panel=document.getElementById('wrongPanel');
  const pw=document.getElementById('practiceWrongBtn');const cl=document.getElementById('clearWrongBtn');
  if(!bank.length){panel.innerHTML=`<div class="empty-wrong">🎉 目前沒有錯題記錄！<br>答錯的題目會自動記錄在這裡。</div>`;pw.style.display='none';cl.style.display='none';return;}
  const top=bank.sort((a,b)=>(b.wrongCount||1)-(a.wrongCount||1));
  panel.innerHTML=`<div class="wrong-summary"><h3>❌ 錯題統計</h3><div class="wrong-stats"><div class="wstat"><div class="wnum">${bank.length}</div><div class="wlbl">總錯題數</div></div><div class="wstat"><div class="wnum" style="color:var(--gold);">${top[0]?top[0].wrongCount:0}</div><div class="wlbl">最多錯${top[0]?'（'+top[0].era+'）':''}</div></div></div></div><div class="wrong-list">${top.map(q=>`<div class="wrong-item"><div class="wi-era">${q.era} · 答錯 ${q.wrongCount||1} 次</div><div class="wi-q">${q.q}</div><div class="wi-ans">✓ ${q.type==='tf'?(q.ans?'正確':'錯誤'):(q.opts?q.opts[q.ans]:q.ans||'')}</div></div>`).join('')}</div>`;
  pw.style.display='block';cl.style.display='block';
}
function clearWrong(){if(confirm('確定要清除所有錯題記錄嗎？')){saveWB([]);renderWP();}}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function confetti(){const cols=['#7b2fbe','#e8a020','#c0392b','#9b59b6','#faf0ff'];for(let i=0;i<45;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cf';el.style.left=Math.random()*100+'vw';el.style.background=cols[Math.floor(Math.random()*cols.length)];el.style.animationDuration=(1.2+Math.random()*1.2)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);},i*35);}}
function restart(){startGame();}
function goHome(){showScreen('home');}
function goWrong(){showScreen('home');document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-panel="wrong"]').classList.add('active');document.getElementById('panel-wrong').classList.add('active');renderWP();}
</script>
