<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公民闖關王 第六冊</title>
<style>
:root{
  --bg:#f5f0ff;--ink:#1a0a2e;--red:#c0392b;--gold:#6c3483;
  --teal:#5b2c6f;--blue:#4a235a;--accent:#8e44ad;
  --green:#1a7a3a;--card:#ffffff;--shadow:rgba(26,10,46,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Microsoft JhengHei','微軟正黑體',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 15% 25%,rgba(142,68,173,.08) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 85% 75%,rgba(108,52,131,.06) 0%,transparent 70%);pointer-events:none;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;}
#home{padding:24px 16px;justify-content:flex-start;background:linear-gradient(155deg,#e8d5f5 0%,#f5f0ff 60%);}
.brush-title{font-size:clamp(1.6rem,6.5vw,2.8rem);font-weight:900;color:var(--ink);letter-spacing:.12em;position:relative;display:inline-block;padding:0 10px;}
.brush-title::before,.brush-title::after{content:'';position:absolute;height:4px;width:36%;background:var(--accent);bottom:-5px;border-radius:2px;}
.brush-title::before{left:0;}.brush-title::after{right:0;}
.home-badge{display:inline-block;background:var(--accent);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:.1em;margin-top:10px;}
.home-header{text-align:center;margin-bottom:18px;width:100%;}
.nav-tabs{display:flex;gap:6px;width:100%;max-width:680px;margin-bottom:16px;border-bottom:2px solid rgba(26,10,46,.1);}
.nav-tab{padding:8px 16px;font-weight:700;font-size:.85rem;color:rgba(26,10,46,.42);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;width:100%;max-width:680px;}
.tab-panel.active{display:block;}
.slabel{font-size:.7rem;letter-spacing:.18em;color:rgba(26,10,46,.38);margin-bottom:8px;margin-top:14px;}
.topic-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.tchip{padding:6px 13px;border-radius:17px;border:1.5px solid rgba(26,10,46,.18);background:white;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--ink);user-select:none;}
.tchip.on{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:4px;}
@media(max-width:400px){.mode-grid{grid-template-columns:1fr;}}
.mcard{background:white;border:2px solid rgba(26,10,46,.1);border-radius:13px;padding:15px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.mcard:hover{transform:translateY(-2px);box-shadow:0 5px 16px var(--shadow);}
.mcard.picked{border-color:var(--accent);background:#e8d5f5;}
.mcard .micon{font-size:1.7rem;display:block;margin-bottom:6px;}
.mcard .mtitle{font-weight:900;font-size:.92rem;color:var(--ink);}
.mcard .mdesc{font-size:.7rem;color:rgba(26,10,46,.48);margin-top:3px;line-height:1.4;}
.go-btn{background:var(--red);color:white;border:none;border-radius:12px;padding:14px 0;font-size:1rem;font-weight:900;letter-spacing:.12em;cursor:pointer;margin-top:16px;transition:all .2s;box-shadow:0 4px 14px rgba(192,57,43,.3);width:100%;max-width:680px;}
.go-btn:hover:not(:disabled){transform:translateY(-2px);}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}
.wrong-panel{width:100%;max-width:680px;}
.wrong-summary{background:white;border-radius:13px;padding:15px;box-shadow:0 3px 13px var(--shadow);margin-bottom:12px;}
.wrong-summary h3{font-size:.95rem;font-weight:900;color:var(--ink);margin-bottom:7px;}
.wrong-stats{display:flex;gap:12px;flex-wrap:wrap;}
.wstat{background:var(--bg);border-radius:8px;padding:9px 14px;text-align:center;flex:1;min-width:80px;}
.wstat .wnum{font-size:1.5rem;font-weight:900;color:var(--red);}
.wstat .wlbl{font-size:.7rem;color:rgba(26,10,46,.48);}
.wrong-list{display:flex;flex-direction:column;gap:7px;}
.wrong-item{background:white;border-radius:9px;padding:11px 13px;box-shadow:0 2px 7px var(--shadow);border-left:4px solid var(--red);}
.wrong-item .wi-era{font-size:.68rem;color:rgba(26,10,46,.38);letter-spacing:.08em;margin-bottom:3px;}
.wrong-item .wi-q{font-size:.86rem;color:var(--ink);font-weight:700;line-height:1.5;}
.wrong-item .wi-ans{font-size:.78rem;color:var(--teal);margin-top:3px;}
.empty-wrong{text-align:center;padding:36px;color:rgba(26,10,46,.33);font-size:.88rem;}
.practice-wrong-btn{background:var(--teal);color:white;border:none;border-radius:10px;padding:12px 0;font-size:.95rem;font-weight:900;cursor:pointer;width:100%;max-width:680px;margin-top:12px;}
.practice-wrong-btn:hover{opacity:.88;}
.clear-wrong-btn{background:transparent;color:rgba(26,10,46,.38);border:1px solid rgba(26,10,46,.18);border-radius:8px;padding:7px 16px;font-size:.78rem;cursor:pointer;margin-top:7px;width:100%;max-width:680px;}
#game{background:var(--bg);padding:9px 13px 22px;}
.gbar{width:100%;max-width:680px;display:flex;justify-content:space-between;align-items:center;background:var(--ink);border-radius:12px;padding:9px 14px;margin-bottom:11px;color:white;}
.gbar-left{font-size:.76rem;opacity:.58;}
.gbar-score{background:var(--accent);color:white;font-weight:900;border-radius:13px;padding:3px 11px;font-size:.88rem;}
.gbar-timer{font-weight:900;font-size:.98rem;min-width:22px;text-align:center;}
.gbar-timer.hot{color:var(--red);animation:blink .5s infinite alternate;}
@keyframes blink{to{opacity:.32;}}
.prog-bar{height:3px;background:rgba(255,255,255,.16);border-radius:2px;margin-top:5px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.qcard{background:white;border-radius:14px;padding:19px 17px;width:100%;max-width:680px;box-shadow:0 4px 17px var(--shadow);margin-bottom:11px;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent);border-radius:5px 0 0 5px;}
.qtag{display:inline-block;font-size:.67rem;font-weight:700;padding:2px 9px;border-radius:9px;margin-bottom:10px;letter-spacing:.05em;}
.qtag.mc{background:#e8d5f5;color:var(--teal);}
.qtag.tf{background:#fef8e6;color:#a07800;}
.qtag.fill{background:#e8f8ee;color:var(--green);}
.qtag.match{background:#fce8d0;color:#b06010;}
.qtag.sort{background:#fde8d0;color:#d35400;}
.qtext{font-size:clamp(.9rem,2.7vw,1.08rem);font-weight:700;color:var(--ink);line-height:1.75;margin-bottom:13px;}
.qsub{font-size:.78rem;color:rgba(26,10,46,.43);margin-bottom:11px;font-style:italic;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:380px){.opts{grid-template-columns:1fr;}}
.opt{background:#f5eeff;border:2px solid #d7b8f0;border-radius:9px;padding:9px 11px;font-size:.83rem;color:var(--ink);cursor:pointer;text-align:left;transition:all .17s;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--accent);background:#e8d5f5;}
.opt.ok{background:#d4f5e2;border-color:var(--green);color:var(--green);font-weight:700;}
.opt.bad{background:#fad8d8;border-color:var(--red);color:var(--red);}
.tf-row{display:flex;gap:9px;justify-content:center;}
.tfbtn{flex:1;max-width:125px;padding:12px;border-radius:11px;border:2px solid #d7b8f0;background:#f5eeff;font-size:1.25rem;font-weight:900;cursor:pointer;transition:all .17s;color:var(--ink);}
.tfbtn:hover:not(:disabled){transform:scale(1.05);}
.tfbtn.ok{background:#d4f5e2;border-color:var(--green);}
.tfbtn.bad{background:#fad8d8;border-color:var(--red);}
.fill-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fill-in{border:2px solid #ccc;border-radius:8px;padding:8px 11px;font-size:.9rem;outline:none;min-width:130px;flex:1;transition:border-color .2s;color:var(--ink);background:white;}
.fill-in:focus{border-color:var(--accent);}
.fill-in.ok{border-color:var(--green);background:#d4f5e2;}
.fill-in.bad{border-color:var(--red);background:#fad8d8;}
.sub-btn{background:var(--blue);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:.83rem;font-weight:700;cursor:pointer;}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.match-col{display:flex;flex-direction:column;gap:5px;}
.match-item{background:#f5eeff;border:2px solid #d7b8f0;border-radius:9px;padding:8px 10px;font-size:.8rem;cursor:pointer;transition:all .17s;min-height:38px;display:flex;align-items:center;color:var(--ink);line-height:1.35;}
.match-item:hover:not(.done){border-color:var(--accent);}
.match-item.selected{border-color:var(--gold);background:#e8d5f5;font-weight:700;}
.match-item.matched{border-color:var(--green);background:#d4f5e2;color:var(--green);font-weight:700;}
.match-item.wrong-flash{border-color:var(--red);background:#fad8d8;}
.sort-list{display:flex;flex-direction:column;gap:6px;}
.sort-item{background:#e8d5f5;border:2px solid #d7b8f0;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:grab;font-size:.83rem;user-select:none;color:var(--ink);}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:.4;}
.sort-handle{color:#aaa;}
.sort-check{background:var(--teal);color:white;border:none;border-radius:9px;padding:9px 20px;font-weight:700;font-size:.83rem;cursor:pointer;margin-top:8px;}
.fb-box{border-radius:10px;padding:10px 13px;margin-top:11px;font-size:.82rem;line-height:1.6;display:none;}
.fb-box.show{display:block;}
.fb-box.ok{background:#d4f5e2;color:var(--green);border-left:4px solid var(--green);}
.fb-box.bad{background:#fad8d8;color:var(--red);border-left:4px solid var(--red);}
.fb-title{font-weight:900;margin-bottom:2px;}
.next-btn{background:var(--ink);color:white;border:none;border-radius:10px;padding:12px 0;font-weight:900;font-size:.95rem;cursor:pointer;width:100%;max-width:680px;margin-top:4px;display:none;transition:background .2s;}
.next-btn.show{display:block;}
.next-btn:hover{background:var(--accent);}
#result{background:linear-gradient(155deg,#e8d5f5 0%,#f5f0ff 100%);padding:32px 14px;justify-content:center;}
.result-card{background:white;border-radius:18px;padding:28px 22px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 26px var(--shadow);}
.r-emoji{font-size:3.3rem;margin-bottom:8px;}
.r-title{font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:5px;}
.r-score{font-size:2.8rem;font-weight:900;color:var(--accent);}
.r-max{font-size:.8rem;color:rgba(26,10,46,.4);margin-bottom:13px;}
.r-stars{font-size:1.7rem;margin-bottom:13px;}
.r-msg{font-size:.86rem;color:rgba(26,10,46,.58);line-height:1.7;margin-bottom:16px;}
.r-weak{background:var(--bg);border-radius:9px;padding:11px 13px;text-align:left;margin-bottom:16px;}
.r-weak h4{color:var(--accent);font-size:.76rem;letter-spacing:.1em;margin-bottom:5px;}
.r-weak p{font-size:.78rem;color:rgba(26,10,46,.68);line-height:1.8;}
.r-saved{font-size:.73rem;color:var(--teal);margin-top:9px;}
.r-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.r-btn{flex:1;padding:10px;border-radius:9px;font-weight:900;font-size:.9rem;cursor:pointer;border:none;transition:all .2s;}
.r-btn.pri{background:var(--red);color:white;}
.r-btn.sec{background:#f5eeff;color:var(--ink);}
.r-btn.ter{background:var(--teal);color:white;}
.r-btn:hover{transform:translateY(-2px);}
.combo{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:999;font-size:2.1rem;font-weight:900;color:var(--accent);pointer-events:none;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);}
.combo.show{transform:translate(-50%,-80%) scale(1);}
.cf{position:fixed;top:-10px;width:8px;height:14px;border-radius:2px;pointer-events:none;z-index:998;animation:fall 2s ease-in forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="screen active" id="home">
  <div class="home-header">
    <div class="brush-title">公民闖關王</div>
    <div class="home-badge">公民 第六冊 · 單元14 · 會考複習</div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-panel="play">🎮 開始遊戲</div>
    <div class="nav-tab" data-panel="wrong">❌ 錯題複習區</div>
  </div>
  <div class="tab-panel active" id="panel-play">
    <div class="slabel">選擇單元（可多選）</div>
    <div class="topic-row" id="topicRow">
      <div class="tchip on" data-t="u14a">💻 科技隱憂與隱私保護</div>
      <div class="tchip on" data-t="u14b">🏆 智慧財產權</div>
      <div class="tchip on" data-t="u14c">🌍 全球化現象與議題</div>
      <div class="tchip on" data-t="u14d">🤝 國際互動與組織</div>
      <div class="tchip on" data-t="u14e">🇹🇼 我國的國際參與</div>
    </div>
    <div class="slabel">選擇模式</div>
    <div class="mode-grid">
      <div class="mcard" data-m="normal"><span class="micon">📝</span><div class="mtitle">練習模式</div><div class="mdesc">不限時・50題・有解析</div></div>
      <div class="mcard" data-m="timed"><span class="micon">⏱️</span><div class="mtitle">限時模式</div><div class="mdesc">每題20秒・50題</div></div>

      <div class="mcard" data-m="survival"><span class="micon">❤️</span><div class="mtitle">生存模式</div><div class="mdesc">答錯3次結束・20題</div></div>

    <button class="go-btn" id="goBtn" disabled>請選擇單元與模式</button>

  <div class="tab-panel" id="panel-wrong">
    <div class="wrong-panel" id="wrongPanel"></div>
    <button class="practice-wrong-btn" id="practiceWrongBtn" style="display:none;" onclick="startWrongPractice()">針對錯題練習 🔥</button>
    <button class="clear-wrong-btn" id="clearWrongBtn" style="display:none;" onclick="clearWrong()">清除所有錯題記錄</button>
  </div>
</div>
<div class="screen" id="game">
  <div class="gbar">
    <div><div class="gbar-left" id="gInfo">第 1 / 50 題</div><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div></div>
    <div style="display:flex;gap:10px;align-items:center;"><div class="gbar-timer" id="gTimer" style="display:none;">20</div><div><div class="gbar-score" id="gScore">0 分</div><div style="font-size:.67rem;color:rgba(255,255,255,.48);text-align:right;margin-top:2px;" id="gLives"></div></div></div>
  </div>
  <div class="qcard">
    <div class="qtag mc" id="qtag">選擇題</div>

    <div id="ans-area"></div>
    <div class="fb-box" id="fbbox"><div class="fb-title" id="fbtitle"></div><div id="fbmsg"></div></div>
  </div>
  <button class="next-btn" id="nextBtn">下一題 →</button>
</div>
<div class="screen" id="result">
  <div class="result-card">
    <div class="r-emoji" id="rEmoji">🎉</div><div class="r-title" id="rTitle">太棒了！</div>
    <div class="r-score" id="rScore">0</div><div class="r-max" id="rMax">分</div>

      <button class="r-btn pri" onclick="restart()">再玩一次 🔄</button>

</div>
<div class="combo" id="combo"></div>
<script>
const SK='civ6_wrong_v1';
function loadWB(){try{return JSON.parse(localStorage.getItem(SK)||'[]');}catch(e){return[];}}
function saveWB(a){try{localStorage.setItem(SK,JSON.stringify(a));}catch(e){}}
function addWB(q){let b=loadWB();const i=b.findIndex(x=>x.q===q.q);if(i===-1){b.push({...q,wrongCount:1,lastWrong:Date.now()});}else{b[i].wrongCount=(b[i].wrongCount||1)+1;b[i].lastWrong=Date.now();}saveWB(b);}
function removeWB(q){let b=loadWB();b=b.filter(x=>x.q!==q.q);saveWB(b);}

const QB=[

// ══ 單元14a：科技隱憂與隱私保護 ══
{t:'u14a',era:'科技・資訊科技負面影響',type:'mc',
 q:'下列何者不屬於資訊科技發展帶來的「負面影響」？',
 opts:['A 資訊內容真假難辨，假訊息泛濫','B 網路犯罪問題日益嚴重','C 大幅提升人類對資訊的掌握能力','D 公開資訊侵犯個人隱私'],ans:2,
 explain:'資訊科技負面影響：①資訊內容真假難辨（假訊息）②網路犯罪問題（詐騙、駭客）③公開資訊侵犯隱私（個人資料外洩）。「大幅提升對資訊的掌握能力」是正面影響，不是負面的。'},

{t:'u14a',era:'科技・科技倫理',type:'mc',
 q:'「科技倫理」的意義是？',
 opts:[
   'A 政府制定科技法律',
   'B 發展科技或使用科技所應遵守的行為準則，包含資訊倫理等與科技相關的倫理',
   'C 禁止使用科技產品',
   'D 科技公司的商業道德規範'
 ],ans:1,
 explain:'科技倫理：法律的修改跟不上科技發展的速度，因此需要提升使用者的倫理道德。科技倫理包含：發展科技或使用科技所應遵守的行為準則（如資訊倫理、勿侵犯他人隱私、注意網路禮儀等）。'},

{t:'u14a',era:'科技・隱私權',type:'mc',
 q:'「隱私權」的定義是？',
 opts:[
   'A 不需要公開個人資料的財產權',
   'B 指公眾和社會益無關的個人行為或紀錄，有不被公布周知的權利',
   'C 只有名人才擁有的特殊權利',
   'D 政府不得蒐集任何個人資料的規定'
 ],ans:1,
 explain:'隱私權：指公眾和社會利益無關的個人行為或紀錄，有不被公布周知的權利。個人資料包含姓名、性別、出生日期、身分證字號、指紋、病歷、財務狀況等。隱私權是人格權的一部分，受憲法保障。'},

{t:'u14a',era:'科技・個人資料保護',type:'mc',
 q:'「個人資料保護法」的主要目的是？',
 opts:[
   'A 禁止企業蒐集任何個人資料',
   'B 為確保個人資料合理使用，規範個人資料的蒐集、處理及利用',
   'C 允許政府無限制查閱個人資料',
   'D 管理網路使用行為'
 ],ans:1,
 explain:'個人資料保護法：為確保個人資料的合理使用而制定，規範個人資料的蒐集、處理及利用方式。相關法律還有：憲法（保障秘密通訊自由）、刑法（妨害秘密罪、妨害電腦使用罪）等共同保護隱私權。'},

{t:'u14a',era:'科技・假訊息辨別',type:'tf',
 q:'在網路上看到訊息時，應先轉發給親友，之後再查核是否為假訊息。',
 ans:false,
 explain:'正確做法應該相反：瀏覽到訊息時，應先多方查證（使用查核工具、比對多個可信來源），確認為真實訊息後才考慮分享。先轉發再查核，可能成為散播假訊息的幫兇。媒體識讀能力是現代公民的重要素養。'},

{t:'u14a',era:'科技・資訊安全',type:'mc',
 q:'「資訊安全」方面，企業的責任是？',
 opts:[
   'A 企業不需要對個人資料外洩負任何責任',
   'B 企業應強化資訊安全服務，提供使用者安全的網路環境，防止個人資料外洩',
   'C 企業可以自由出售客戶個人資料',
   'D 企業只需要保護自己的商業機密'
 ],ans:1,
 explain:'資訊安全兩大責任：①企業社會責任：強化資訊安全服務，提供使用者安全的網路環境（防止資料外洩）；②使用者責任：使用網路資源時，注意資訊安全，避免個人資料外洩（設強密碼、不隨意點陌生連結）。'},

// ══ 單元14b：智慧財產權 ══
{t:'u14b',era:'智財・意義',type:'mc',
 q:'「智慧財產」的定義是？',
 opts:[
   'A 有形的財物，如房屋、土地',
   'B 是創作者花費心力與智慧，透過構思、創作、發明等過程，所產生具有價值的無形產物',
   'C 只包含電腦程式和軟體',
   'D 政府機關的官方文件'
 ],ans:1,
 explain:'智慧財產：創作者花費心力與智慧，透過構思、創作、發明等過程，產生具有價值的無形產物。相關法律包含：著作權法、商標法、專利法。保護智慧財產同時調和公益，政府規定他人在合理範圍內可使用。'},

{t:'u14b',era:'智財・三法比較',type:'match',
 q:'請將智慧財產相關法律與保護對象配對：',
 pairs:[
   ['著作權法','保障著作財產益；保護文學、藝術、音樂、電影等創作者的權益'],
   ['商標法','確保公平競爭秩序、維護消費者利益；保護商品識別標誌（品牌名稱、logo等）'],
   ['專利法','鼓勵技術創新；保護發明、新型、設計等技術成果'],
 ],
 explain:'著作→創作物；商標→品牌識別（Nike、Apple等）；專利→技術發明。著作權完成即有，商標和專利需向政府申請登記。'},

{t:'u14b',era:'智財・著作權保護期限',type:'mc',
 q:'著作財產權的保護年限至？',
 opts:['A 著作完成後30年','B 著作人死後50年為止','C 永久保護，不會消滅','D 著作公開後20年'],ans:1,
 explain:'著作財產權：保護年限從著作完成開始，至著作人死後50年為止（到期後成為公共財，任何人均可自由使用）。注意：不同類型的智慧財產保護年限依各項法律規定，時效不一。'},

{t:'u14b',era:'智財・著作權合法使用',type:'mc',
 q:'下列哪種情況屬於著作的「合法使用」（合理使用）？',
 opts:[
   'A 未經著作人同意，大量複印整本教科書販售',
   'B 民眾基於學術、教育、個人利用等非營利目的，在合理範圍內引用他人著作，不須支付費用但須標明出處',
   'C 上傳他人音樂至影片中，標明來源即合法',
   'D 購買CD後，將其轉售給他人'
 ],ans:1,
 explain:'著作合法使用（合理使用）：①已獲著作財產權人同意授權②民眾基於學術、教育、個人非營利目的，在合理範圍引用（須標明出處）③透過公共授權（如創用CC）方式分享。評估標準：利用目的、利用比例、市場價值。'},

{t:'u14b',era:'智財・違法行為',type:'mc',
 q:'「未經著作權人同意，上傳、下載、轉貼媒體檔案」，依法應負什麼責任？',
 opts:[
   'A 只需口頭道歉',
   'B 刑事責任（可處罰金）；並依民法侵權行為規定，還必須負擔民事賠償費用',
   'C 只需支付授權費即可免責',
   'D 網路行為不受法律管轄'
 ],ans:1,
 explain:'著作權違法行為：未經授權上傳、下載、轉貼、販售等。法律責任：①刑事責任：依著作權法，可處罰金（刑事責任）；②民事責任：依民法侵權行為規定，必須負擔民事賠償費用。兩種責任可能同時發生。'},

{t:'u14b',era:'智財・創用CC',type:'mc',
 q:'「創用CC（Creative Commons）」授權的特色是？',
 opts:[
   'A 完全放棄著作權，任何人都可無限制使用',
   'B 著作人可從中挑選適合自己著作的授權條款，讓大眾在符合條件下自由使用，不須另外取得授權',
   'C 只有政府機關才能使用創用CC授權',
   'D 使用創用CC授權的作品需要付費'
 ],ans:1,
 explain:'創用CC：任何人在著作權人設定授權條件下，可自由使用創用CC授權著作，不須另外取得授權。常見授權條款包含：姓名標示、非商業性、相同方式分享、禁止改作等組合。讓著作人保留部分權利、分享文化創作。'},

// ══ 單元14c：全球化現象與議題 ══
{t:'u14c',era:'全球化・意義',type:'mc',
 q:'「全球化」的核心意涵是？',
 opts:[
   'A 全世界統一使用相同的語言和文化',
   'B 全球密切互動的過程，人才、資金、商品、資訊等在全球快速流動，造成國際間互相依存的現象',
   'C 已開發國家控制全球經濟的現象',
   'D 各國政府聯合管理全球事務'
 ],ans:1,
 explain:'全球化：指全球密切互動的過程，人才、資金、商品、資訊等在全球快速流動，造成國際間互相依存的現象。世界成為「地球村」、「牽一髮而動全身」的全球關連現象。成因：交通、貿易和傳播科技的快速發展。'},

{t:'u14c',era:'全球化・三面向',type:'match',
 q:'請將全球化的三大面向與說明配對：',
 pairs:[
   ['經濟全球化','跨國投資、全球產業分工與跨國企業等，各國經濟活動頻繁互動'],
   ['政治全球化','跨國政治協商機會增加，加入國際組織讓定國際公約增多'],
   ['文化全球化','因傳播媒體發達、移民或移工流動，使文化交流機會增加，文化接觸頻繁'],
 ],
 explain:'全球化三面向：①經濟（跨國投資企業）②政治（跨國政治合作與國際組織）③文化（文化接觸傳播頻繁）。三者優缺點並存，全球化的面相並非全自立存在，而是互相影響。'},

{t:'u14c',era:'全球化・議題',type:'mc',
 q:'全球化帶來的「貧富不均」議題，主要原因是？',
 opts:[
   'A 全球化讓各國都能平均分享經濟成果',
   'B 跨國企業發達獨占利潤，大部分利潤流回企業母國，開發中國家勞工未得合理報酬，形成不公平貿易',
   'C 貧富不均只是個別國家的內部問題',
   'D 已開發國家故意阻止開發中國家發展'
 ],ans:1,
 explain:'全球化貧富不均議題：①全球化讓各國經濟大幅成長，但財富分配越來越不均，大部分經濟收益由已開發國家與少數富人享有；②跨國企業發達獨占利潤、大部分利潤流回企業母國；③開發中國家勞工所得低、工時長。因應：參與國際組織、監管跨國企業、創造平等就業機會、鼓勵公平貿易。'},

{t:'u14c',era:'全球化・議題',type:'mc',
 q:'「難民與移民議題」中，難民的主要成因是？',
 opts:[
   'A 因追求更好的經濟機會而主動移居',
   'B 因種族、宗教、政治等遭受迫害，或遭受戰爭、飢荒等因素，被迫離開自己的國家',
   'C 因教育機會不足而離開本國',
   'D 因全球化帶動的文化交流影響'
 ],ans:1,
 explain:'難民與移民的差異：①難民：被迫離開本國（戰爭、迫害、飢荒等），依國際公約規定，難民身份分認定後，其他國家有接受義務，移民身份才能進入居住國；②移民：主動選擇移居他國（追求更好的經濟、教育等機會）。'},

{t:'u14c',era:'全球化・議題',type:'mc',
 q:'全球化帶來的「文化議題」中，「文化霸權」是指？',
 opts:[
   'A 各國文化平等地交流',
   'B 強勢文化（通常是西方文化）向外擴張，侵蝕在地文化與傳統，使文化多樣性消失',
   'C 弱勢文化強迫他人接受自己的文化',
   'D 政府禁止外來文化進入'
 ],ans:1,
 explain:'全球化文化議題：①西方文化向外擴張（文化霸權）→侵蝕在地文化與傳統；②文化頻繁交流→可能造成文化衝突，也可能促進文化創新。因應：維護在地文化與傳統文化的保存和活化、尊重各國多元文化、學習母語。'},

{t:'u14c',era:'全球化・疾病傳播',type:'tf',
 q:'全球化使得疾病傳播速度和範圍都大幅縮小，因為各國醫療技術互相交流進步。',
 ans:false,
 explain:'全球化使疾病傳播速度加快、範圍擴大（而非縮小）：因旅遊、貿易、移民等人員與物資的流動，病毒能迅速在世界各地傳播。如新冠肺炎、SARS等疾病迅速蔓延全球。因應：各國政府防疫合作、世界衛生組織（WHO）公告疫情、民眾做好自我健康管理。'},

// ══ 單元14d：國際互動與組織 ══
{t:'u14d',era:'國際互動・四種形式',type:'match',
 q:'請將國際互動的四種形式與說明配對：',
 pairs:[
   ['國際交流','透過政府或民間團體力量，進行國際貿易、學術文化、體育藝術等文化交流活動'],
   ['國際合作','國際間為了共同利益和目標，透過結盟國家或簽訂條約等方式，在政治、技術、軍事與人才等多方面的合作'],
   ['國際援助','基於人道精神，援助受災或低度開發的國家，給予經濟、物資或技術援助'],
   ['國際衝突','因族群、利益、宗教、種族等因素，形成的對立或衝突，衝突最激烈時為戰爭'],
 ],
 explain:'國際互動四種：交流（文化體育）→合作（條約聯盟）→援助（人道主義）→衝突（對立戰爭）。奧林匹克運動會是交流；策略合作備忘錄是合作；提供防疫物資是援助；敘利亞內戰是衝突。'},

{t:'u14d',era:'國際組織・依性質區分',type:'mc',
 q:'聯合國（UN）屬於哪種性質的國際組織？',
 opts:[
   'A 國際非政府組織（NGO）',
   'B 政府間國際組織（IGO）',
   'C 區域性國際組織',
   'D 企業跨國組織'
 ],ans:1,
 explain:'國際組織依性質區分：①政府間國際組織（IGO）：由各主權國家透過簽訂條約或通過法律操作的國際公約而成立，具官方性質（如聯合國UN、世界衛生組織WHO、世界貿易組織WTO）；②國際非政府組織（NGO）：由民間各界人士所組成，不具官方身份（如綠色和平、國際醫師組織）。'},

{t:'u14d',era:'國際組織・三大組織',type:'match',
 q:'請將三大重要國際組織與其任務配對：',
 pairs:[
   ['聯合國（UN）','規模最大的國際組織，維護世界和平與安全，解決各國在經濟、社會等方面的問題'],
   ['世界衛生組織（WHO）','聯合國附屬機構，致力於衛生保健及防疫工作，改善全人類的健康狀況'],
   ['世界貿易組織（WTO）','確保自由貿易、降低關稅，消除貿易障礙，解決國際間貿易糾紛問題'],
 ],
 explain:'UN→和平與安全；WHO→衛生健康（非獨立，附屬聯合國）；WTO→自由貿易（非聯合國附屬機構！這是滿分提點）。WTO是「經濟上的聯合國」，但不隸屬於聯合國。'},

{t:'u14d',era:'國際組織・依分布區域',type:'mc',
 q:'下列何者屬於「區域性國際組織」？',
 opts:['A 聯合國（UN）','B 世界貿易組織（WTO）','C 歐洲聯盟（EU）','D 世界衛生組織（WHO）'],ans:2,
 explain:'依分布區域：①全球性國際組織：成員來自世界各地（聯合國UN、WHO、WTO）；②區域性國際組織：通常以單一地區的國家為主（歐洲聯盟EU、亞太經濟合作會議APEC、東南亞國家協會ASEAN）。'},

{t:'u14d',era:'國際組織・WTO補充',type:'tf',
 q:'「世界貿易組織（WTO）」是聯合國的附屬機構。',
 ans:false,
 explain:'這是常考的滿分提點！世界貿易組織（WTO）不是聯合國的附屬機構，是獨立的國際組織，被稱為「經濟上的聯合國」。聯合國的附屬機構包含：世界衛生組織（WHO）、聯合國教科文組織（UNESCO）、國際勞工組織（ILO）等。'},

// ══ 單元14e：我國的國際參與 ══
{t:'u14e',era:'國際參與・兩岸關係',type:'mc',
 q:'我國（中華民國）在國際上的主要困境是？',
 opts:[
   'A 缺乏優秀的外交人才',
   'B 中國大陸堅持「一個中國」原則，持續在外交上打壓我國，限制我國參與各級政府間國際組織',
   'C 台灣地理位置不利外交發展',
   'D 我國主動退出大多數國際組織'
 ],ans:1,
 explain:'我國國際參與困境：①兩岸分治：1949年中華民國政府遷台後，兩岸分治至今；②中國打壓：中國大陸堅持「一個中國」原則，我國無法以主權國家名義加入各政府間國際組織活動，造成國際空間受限（如2009年以觀察員身份參與世衛大會WHA）。'},

{t:'u14e',era:'國際參與・政府間組織',type:'mc',
 q:'台灣以「中華台北」名義參與的國際組織，主要目的是因應哪個限制？',
 opts:[
   'A 台灣自願使用不同名稱',
   'B 因中國打壓，我國無法以「中華民國」名義加入政府間國際組織，故以特殊名稱參與',
   'C 「中華台北」是台灣的正式國名',
   'D 為了統一各運動比賽的代表隊名稱'
 ],ans:1,
 explain:'我國以「中華台北」名義參與亞太經濟合作會議（APEC）、奧林匹克運動會等，因應中國「一個中國」原則的打壓，在外交妥協下以特殊名稱維持國際參與。我國與世界各國在經濟方面建立緊密的合作關係。'},

{t:'u14e',era:'國際參與・非政府組織',type:'mc',
 q:'我國參與「國際非政府組織（NGO）」的方式和意義是？',
 opts:[
   'A 我國完全無法參與任何國際非政府組織',
   'B 以中華台北名義參與奧林匹克運動會、參加台灣路竹會等醫療服務，突破政治限制，在民間層面維持國際聯繫',
   'C 國際非政府組織只有主權國家才能加入',
   'D 參與NGO需要中國同意'
 ],ans:1,
 explain:'我國參與國際非政府組織（NGO）：不受「一個中國」原則限制，因為NGO是民間組織，不需具有主權國家身份。例：以中華台北名義參加奧林匹克運動會、台灣路竹會提供國際醫療援助、台灣世界展望會辦理扶助貧困活動。'},

{t:'u14e',era:'國際參與・APEC和WTO',type:'match',
 q:'請將我國參與的國際組織與參與名義配對：',
 pairs:[
   ['亞太經濟合作會議（APEC）','以「中華台北」名義參與'],
   ['世界貿易組織（WTO）','以「臺澎金馬個別關稅領域」名義參與'],
   ['奧林匹克運動會','以「中華台北」名義參與'],
 ],
 explain:'我國在不同組織以不同名義參與：APEC和奧林匹克→中華台北；WTO→臺澎金馬個別關稅領域。這些特殊安排都是在中國打壓下的外交妥協，讓我國仍能維持一定程度的國際參與。'},

{t:'u14e',era:'國際參與・全球化角色',type:'mc',
 q:'面對全球化挑戰，我國應採取的態度是？',
 opts:[
   'A 完全閉關，拒絕所有外來文化和貿易',
   'B 積極參與國際事務，透過交流、合作、援助等方式貢獻國際社會，同時保留本國文化特色',
   'C 任由全球化改變我國文化，完全接受外來影響',
   'D 只關注兩岸關係，不參與其他國際事務'
 ],ans:1,
 explain:'因應全球化：既要積極參與國際事務（經濟合作、文化交流、人道援助等），也要在交流中保留本國文化特色（發揚傳統文化、尊重多元文化）。全球化有利有弊，應善用其優點（擴大市場、文化創新）、因應其挑戰（貧富不均、文化消失）。'},

];

let S={mode:null,topics:[],qs:[],cur:0,score:0,lives:3,combo:0,answered:false,timer:null,tval:0,wrong:{},isWP:false};
document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('panel-'+tab.dataset.panel).classList.add('active');if(tab.dataset.panel==='wrong')renderWP();});});
document.querySelectorAll('.tchip').forEach(c=>c.addEventListener('click',()=>{c.classList.toggle('on');updateGo();}));
document.querySelectorAll('.mcard').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.mcard').forEach(x=>x.classList.remove('picked'));c.classList.add('picked');S.mode=c.dataset.m;updateGo();}));
function updateGo(){S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);const btn=document.getElementById('goBtn');if(S.topics.length&&S.mode){btn.disabled=false;btn.textContent='開始闖關 🚀';}else{btn.disabled=true;btn.textContent='請選擇單元與模式';}}
document.getElementById('goBtn').addEventListener('click',startGame);
function startGame(){S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);S.score=0;S.lives=3;S.combo=0;S.answered=false;S.wrong={};S.isWP=false;const isLong=S.mode==='normal'||S.mode==='timed';let pool=QB.filter(q=>S.topics.includes(q.t));pool=shuffle(pool);S.qs=pool.slice(0,Math.min(isLong?50:20,pool.length));S.cur=0;showScreen('game');renderQ();}
function startWrongPractice(){const bank=loadWB();if(!bank.length){alert('沒有錯題記錄！');return;}S.score=0;S.lives=3;S.combo=0;S.answered=false;S.wrong={};S.isWP=true;S.mode='normal';S.qs=shuffle([...bank]).slice(0,Math.min(20,bank.length));S.cur=0;showScreen('game');renderQ();}
function renderQ(){if(S.cur>=S.qs.length){showResult();return;}const q=S.qs[S.cur];S.answered=false;const total=S.qs.length;document.getElementById('gInfo').textContent=`第 ${S.cur+1} / ${total} 題${S.isWP?' 📌錯題':''}`;document.getElementById('progFill').style.width=`${(S.cur/total)*100}%`;document.getElementById('gScore').textContent=`${S.score} 分`;if(S.mode==='survival')document.getElementById('gLives').textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));else document.getElementById('gLives').textContent='';const tMap={mc:'選擇題',tf:'是非題',fill:'填空題',match:'連連看',sort:'排序題'};const cMap={mc:'mc',tf:'tf',fill:'fill',match:'match',sort:'sort'};document.getElementById('qtag').textContent=tMap[q.type]||'題目';document.getElementById('qtag').className=`qtag ${cMap[q.type]||'mc'}`;document.getElementById('qtext').textContent=q.q;document.getElementById('qsub').textContent=q.hint||'';const area=document.getElementById('ans-area');area.innerHTML='';document.getElementById('fbbox').className='fb-box';document.getElementById('nextBtn').className='next-btn';if(q.type==='mc')renderMC(q,area);else if(q.type==='tf')renderTF(q,area);else if(q.type==='fill')renderFillQ(q,area);else if(q.type==='match')renderMatch(q,area);else if(q.type==='sort')renderSort(q,area);clearInterval(S.timer);const te=document.getElementById('gTimer');if(S.mode==='blitz'||S.mode==='timed'){te.style.display='block';startTimer(S.mode==='blitz'?8:20);}else te.style.display='none';}
function renderMC(q,area){const grid=document.createElement('div');grid.className='opts';q.opts.forEach((o,i)=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=o;btn.addEventListener('click',()=>{if(S.answered)return;S.answered=true;clearInterval(S.timer);const ok=i===q.ans;grid.querySelectorAll('.opt').forEach((b,bi)=>{b.disabled=true;if(bi===q.ans)b.classList.add('ok');else if(bi===i&&!ok)b.classList.add('bad');});finish(ok,q);});grid.appendChild(btn);});area.appendChild(grid);}
function renderTF(q,area){const row=document.createElement('div');row.className='tf-row';['⭕ 正確','❌ 錯誤'].forEach((label,i)=>{const btn=document.createElement('button');btn.className='tfbtn';btn.innerHTML=label;btn.addEventListener('click',()=>{if(S.answered)return;S.answered=true;clearInterval(S.timer);const userT=i===0,ok=userT===q.ans;row.querySelectorAll('.tfbtn').forEach((b,bi)=>{b.disabled=true;const bT=bi===0;if(bT===q.ans)b.classList.add('ok');else if(bT===userT&&!ok)b.classList.add('bad');});finish(ok,q);});row.appendChild(btn);});area.appendChild(row);}
function renderFillQ(q,area){const row=document.createElement('div');row.className='fill-row';const inp=document.createElement('input');inp.className='fill-in';inp.placeholder='輸入答案…';const btn=document.createElement('button');btn.className='sub-btn';btn.textContent='確認';const go=()=>{if(S.answered||!inp.value.trim())return;S.answered=true;clearInterval(S.timer);const val=inp.value.trim();const ok=val===q.ans||(q.alts&&q.alts.some(a=>val.includes(a)));inp.disabled=true;btn.disabled=true;inp.classList.add(ok?'ok':'bad');finish(ok,q,ok?null:`正確：${q.ans}`);};btn.addEventListener('click',go);inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});row.append(inp,btn);area.appendChild(row);}
function renderMatch(q,area){const wrap=document.createElement('div');wrap.className='match-wrap';const lCol=document.createElement('div');lCol.className='match-col';const rCol=document.createElement('div');rCol.className='match-col';const pairs=q.pairs;const shuffledR=shuffle([...pairs.map((p,i)=>({text:p[1],origIdx:i}))]);let lPicked=null,rPicked=null,matched=0;pairs.forEach((p,i)=>{const el=document.createElement('div');el.className='match-item';el.textContent=p[0];el.dataset.idx=i;el.dataset.side='left';lCol.appendChild(el);});shuffledR.forEach(p=>{const el=document.createElement('div');el.className='match-item';el.textContent=p.text;el.dataset.origIdx=p.origIdx;el.dataset.side='right';rCol.appendChild(el);});wrap.append(lCol,rCol);area.appendChild(wrap);function tryM(){if(!lPicked||!rPicked)return;const li=parseInt(lPicked.dataset.idx),ri=parseInt(rPicked.dataset.origIdx);if(li===ri){[lPicked,rPicked].forEach(el=>{el.classList.remove('selected');el.classList.add('matched','done');});matched++;if(matched===pairs.length){S.answered=true;clearInterval(S.timer);finish(true,q);}}else{[lPicked,rPicked].forEach(el=>el.classList.add('wrong-flash'));setTimeout(()=>{if(lPicked)lPicked.classList.remove('selected','wrong-flash');if(rPicked)rPicked.classList.remove('selected','wrong-flash');lPicked=null;rPicked=null;},600);return;}lPicked=null;rPicked=null;}wrap.addEventListener('click',e=>{if(S.answered)return;const item=e.target.closest('.match-item');if(!item||item.classList.contains('matched'))return;if(item.dataset.side==='left'){if(lPicked)lPicked.classList.remove('selected');lPicked=item;item.classList.add('selected');}else{if(rPicked)rPicked.classList.remove('selected');rPicked=item;item.classList.add('selected');}tryM();});}
let dragEl=null;
function renderSort(q,area){const shuffled=shuffle([...q.items.keys()].map(i=>({i,text:q.items[i]})));const list=document.createElement('div');list.className='sort-list';shuffled.forEach(item=>{const el=document.createElement('div');el.className='sort-item';el.draggable=true;el.dataset.orig=item.i;el.innerHTML=`<span class="sort-handle">☰</span><span>${item.text}</span>`;el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('dragover',e=>e.preventDefault());el.addEventListener('drop',e=>{e.preventDefault();if(dragEl&&dragEl!==el){const all=[...list.querySelectorAll('.sort-item')];const si=all.indexOf(dragEl),ti=all.indexOf(el);if(si<ti)list.insertBefore(dragEl,el.nextSibling);else list.insertBefore(dragEl,el);}});list.appendChild(el);});area.appendChild(list);const chk=document.createElement('button');chk.className='sort-check';chk.textContent='確認順序 ✓';chk.addEventListener('click',()=>{if(S.answered)return;S.answered=true;clearInterval(S.timer);const order=[...list.querySelectorAll('.sort-item')].map(el=>+el.dataset.orig);finish(JSON.stringify(order)===JSON.stringify(q.correctOrder),q);});area.appendChild(chk);}
function finish(ok,q,extraMsg){const pts=calcPts(ok,q.type);if(ok){S.score+=pts;S.combo++;document.getElementById('gScore').textContent=`${S.score} 分`;if(S.combo>=3)showCombo(S.combo);if(S.isWP)removeWB(q);}else{S.combo=0;if(S.mode==='survival')S.lives=Math.max(0,S.lives-1);S.wrong[q.era]=(S.wrong[q.era]||0)+1;addWB(q);}document.getElementById('fbtitle').textContent=ok?'✅ 答對了！':'❌ 答錯了';let msg=q.explain||'';if(extraMsg)msg=extraMsg+'　'+msg;document.getElementById('fbmsg').textContent=msg;document.getElementById('fbbox').className=`fb-box show ${ok?'ok':'bad'}`;const nb=document.getElementById('nextBtn');nb.className='next-btn show';const isLast=S.cur+1>=S.qs.length,isDead=S.mode==='survival'&&S.lives<=0;nb.textContent=(isLast||isDead)?'查看結果 →':'下一題 →';nb.onclick=()=>{S.cur++;if(S.cur>=S.qs.length||isDead)showResult();else renderQ();};}
function calcPts(ok,type){if(!ok)return 0;const base={mc:5,tf:3,fill:6,match:8,sort:7}[type]||5;const combo=S.combo>=4?3:S.combo>=2?1:0;const mB=(S.mode==='blitz'||S.mode==='survival')?2:0;return base+combo+mB;}
function startTimer(sec){S.tval=sec;const el=document.getElementById('gTimer');el.textContent=sec;el.className='gbar-timer';S.timer=setInterval(()=>{S.tval--;el.textContent=S.tval;if(S.tval<=3)el.className='gbar-timer hot';if(S.tval<=0){clearInterval(S.timer);if(!S.answered){S.answered=true;S.combo=0;const q=S.qs[S.cur];document.getElementById('fbtitle').textContent='⏰ 時間到！';document.getElementById('fbmsg').textContent=q.explain||'';document.getElementById('fbbox').className='fb-box show bad';document.querySelectorAll('.opt,.tfbtn,.fill-in,.sub-btn').forEach(b=>b.disabled=true);if(S.mode==='survival')S.lives=Math.max(0,S.lives-1);S.wrong[q.era]=(S.wrong[q.era]||0)+1;addWB(q);const nb=document.getElementById('nextBtn');nb.className='next-btn show';nb.textContent=S.cur+1>=S.qs.length?'查看結果 →':'下一題 →';nb.onclick=()=>{S.cur++;if(S.cur>=S.qs.length)showResult();else renderQ();};}}},1000);}
function showCombo(n){const el=document.getElementById('combo');el.textContent=`🔥 ${n}連勝！`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function showResult(){clearInterval(S.timer);showScreen('result');const max=S.qs.length*6;const pct=max>0?S.score/max:0;let emoji,title,msg;if(pct>=.9){emoji='🏆';title='公民高手！';msg='公民第六冊掌握得非常好！全冊制霸！';}else if(pct>=.7){emoji='🎯';title='表現優異！';msg='大部分都答對了，再針對弱點複習！';}else if(pct>=.5){emoji='📖';title='繼續加油！';msg='去錯題複習區針對弱點加強！';}else{emoji='💪';title='不要灰心！';msg='把講義再仔細看一遍，再來挑戰！';}document.getElementById('rEmoji').textContent=emoji;document.getElementById('rTitle').textContent=title;document.getElementById('rScore').textContent=S.score;document.getElementById('rMax').textContent=`滿分約 ${max} 分`;document.getElementById('rStars').textContent=pct>=.9?'⭐⭐⭐⭐⭐':pct>=.7?'⭐⭐⭐⭐':pct>=.5?'⭐⭐⭐':'⭐⭐';document.getElementById('rMsg').textContent=msg;const weakList=Object.entries(S.wrong).sort((a,b)=>b[1]-a[1]);if(weakList.length){document.getElementById('rWeak').style.display='block';document.getElementById('rWeakList').innerHTML=weakList.map(([k,v])=>`• ${k}（答錯${v}題）`).join('<br>');}else document.getElementById('rWeak').style.display='none';const wc=loadWB().length;document.getElementById('rSaved').textContent=wc>0?`📌 錯題庫共有 ${wc} 題，可至錯題複習區加強`:'';if(pct>=.75)confetti();}
function renderWP(){const bank=loadWB();const panel=document.getElementById('wrongPanel');const pw=document.getElementById('practiceWrongBtn');const cl=document.getElementById('clearWrongBtn');if(!bank.length){panel.innerHTML=`<div class="empty-wrong">🎉 目前沒有錯題記錄！<br>答錯的題目會自動記錄在這裡。</div>`;pw.style.display='none';cl.style.display='none';return;}const top=[...bank].sort((a,b)=>(b.wrongCount||1)-(a.wrongCount||1));panel.innerHTML=`<div class="wrong-summary"><h3>❌ 錯題統計</h3><div class="wrong-stats"><div class="wstat"><div class="wnum">${bank.length}</div><div class="wlbl">總錯題數</div></div><div class="wstat"><div class="wnum" style="color:var(--accent);">${top[0]?top[0].wrongCount:0}</div><div class="wlbl">最多錯${top[0]?'（'+top[0].era+'）':''}</div></div></div></div><div class="wrong-list">${top.map(q=>`<div class="wrong-item"><div class="wi-era">${q.era} · 答錯 ${q.wrongCount||1} 次</div><div class="wi-q">${q.q}</div><div class="wi-ans">✓ ${q.type==='tf'?(q.ans?'正確':'錯誤'):(q.opts?q.opts[q.ans]:q.ans||'')}</div></div>`).join('')}</div>`;pw.style.display='block';cl.style.display='block';}
function clearWrong(){if(confirm('確定要清除所有錯題記錄嗎？')){saveWB([]);renderWP();}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function confetti(){const cols=['#8e44ad','#6c3483','#5b2c6f','#9b59b6','#e8d5f5'];for(let i=0;i<45;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cf';el.style.left=Math.random()*100+'vw';el.style.background=cols[Math.floor(Math.random()*cols.length)];el.style.animationDuration=(1.2+Math.random()*1.2)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);},i*35);}}
function restart(){startGame();}
function goHome(){showScreen('home');}
function goWrong(){showScreen('home');document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-panel="wrong"]').classList.add('active');document.getElementById('panel-wrong').classList.add('active');renderWP();}
</script>
