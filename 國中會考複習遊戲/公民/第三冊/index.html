<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公民闖關王 第三冊</title>
<style>
:root{
  --bg:#f0f8ff;--ink:#0a1a2a;--red:#c0392b;--gold:#1a6ea8;
  --teal:#1a5276;--blue:#154360;--pink:#1a7ab8;--accent:#2980b9;
  --green:#1a7a3a;--card:#ffffff;--shadow:rgba(10,26,42,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Microsoft JhengHei','微軟正黑體',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 25%,rgba(41,128,185,.08) 0%,transparent 70%),
  radial-gradient(ellipse 50% 50% at 85% 75%,rgba(26,110,168,.06) 0%,transparent 70%);pointer-events:none;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

#home{padding:24px 16px;justify-content:flex-start;background:linear-gradient(155deg,#d6eaf8 0%,#f0f8ff 60%);}
.brush-title{font-size:clamp(1.6rem,6.5vw,2.8rem);font-weight:900;color:var(--ink);letter-spacing:.12em;position:relative;display:inline-block;padding:0 10px;}
.brush-title::before,.brush-title::after{content:'';position:absolute;height:4px;width:36%;background:var(--accent);bottom:-5px;border-radius:2px;}
.brush-title::before{left:0;}.brush-title::after{right:0;}
.home-badge{display:inline-block;background:var(--accent);color:white;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:.1em;margin-top:10px;}
.home-header{text-align:center;margin-bottom:18px;width:100%;}

.nav-tabs{display:flex;gap:6px;width:100%;max-width:680px;margin-bottom:16px;border-bottom:2px solid rgba(10,26,42,.1);}
.nav-tab{padding:8px 16px;font-weight:700;font-size:.85rem;color:rgba(10,26,42,.42);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;width:100%;max-width:680px;}
.tab-panel.active{display:block;}

.slabel{font-size:.7rem;letter-spacing:.18em;color:rgba(10,26,42,.38);margin-bottom:8px;margin-top:14px;}
.topic-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.tchip{padding:6px 13px;border-radius:17px;border:1.5px solid rgba(10,26,42,.18);background:white;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--ink);user-select:none;}
.tchip.on{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}

.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:4px;}
@media(max-width:400px){.mode-grid{grid-template-columns:1fr;}}
.mcard{background:white;border:2px solid rgba(10,26,42,.1);border-radius:13px;padding:15px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.mcard:hover{transform:translateY(-2px);box-shadow:0 5px 16px var(--shadow);}
.mcard.picked{border-color:var(--accent);background:#d6eaf8;}
.mcard .micon{font-size:1.7rem;display:block;margin-bottom:6px;}
.mcard .mtitle{font-weight:900;font-size:.92rem;color:var(--ink);}
.mcard .mdesc{font-size:.7rem;color:rgba(10,26,42,.48);margin-top:3px;line-height:1.4;}

.go-btn{background:var(--red);color:white;border:none;border-radius:12px;padding:14px 0;font-size:1rem;font-weight:900;letter-spacing:.12em;cursor:pointer;margin-top:16px;transition:all .2s;box-shadow:0 4px 14px rgba(192,57,43,.3);width:100%;max-width:680px;}
.go-btn:hover:not(:disabled){transform:translateY(-2px);}
.go-btn:disabled{opacity:.4;cursor:not-allowed;}

.wrong-panel{width:100%;max-width:680px;}
.wrong-summary{background:white;border-radius:13px;padding:15px;box-shadow:0 3px 13px var(--shadow);margin-bottom:12px;}
.wrong-summary h3{font-size:.95rem;font-weight:900;color:var(--ink);margin-bottom:7px;}
.wrong-stats{display:flex;gap:12px;flex-wrap:wrap;}
.wstat{background:var(--bg);border-radius:8px;padding:9px 14px;text-align:center;flex:1;min-width:80px;}
.wstat .wnum{font-size:1.5rem;font-weight:900;color:var(--red);}
.wstat .wlbl{font-size:.7rem;color:rgba(10,26,42,.48);}
.wrong-list{display:flex;flex-direction:column;gap:7px;}
.wrong-item{background:white;border-radius:9px;padding:11px 13px;box-shadow:0 2px 7px var(--shadow);border-left:4px solid var(--red);}
.wrong-item .wi-era{font-size:.68rem;color:rgba(10,26,42,.38);letter-spacing:.08em;margin-bottom:3px;}
.wrong-item .wi-q{font-size:.86rem;color:var(--ink);font-weight:700;line-height:1.5;}
.wrong-item .wi-ans{font-size:.78rem;color:var(--teal);margin-top:3px;}
.empty-wrong{text-align:center;padding:36px;color:rgba(10,26,42,.33);font-size:.88rem;}
.practice-wrong-btn{background:var(--teal);color:white;border:none;border-radius:10px;padding:12px 0;font-size:.95rem;font-weight:900;cursor:pointer;width:100%;max-width:680px;margin-top:12px;}
.practice-wrong-btn:hover{opacity:.88;}
.clear-wrong-btn{background:transparent;color:rgba(10,26,42,.38);border:1px solid rgba(10,26,42,.18);border-radius:8px;padding:7px 16px;font-size:.78rem;cursor:pointer;margin-top:7px;width:100%;max-width:680px;}

#game{background:var(--bg);padding:9px 13px 22px;}
.gbar{width:100%;max-width:680px;display:flex;justify-content:space-between;align-items:center;background:var(--ink);border-radius:12px;padding:9px 14px;margin-bottom:11px;color:white;}
.gbar-left{font-size:.76rem;opacity:.58;}
.gbar-score{background:var(--accent);color:white;font-weight:900;border-radius:13px;padding:3px 11px;font-size:.88rem;}
.gbar-timer{font-weight:900;font-size:.98rem;min-width:22px;text-align:center;}
.gbar-timer.hot{color:var(--red);animation:blink .5s infinite alternate;}
@keyframes blink{to{opacity:.32;}}
.prog-bar{height:3px;background:rgba(255,255,255,.16);border-radius:2px;margin-top:5px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}

.qcard{background:white;border-radius:14px;padding:19px 17px;width:100%;max-width:680px;box-shadow:0 4px 17px var(--shadow);margin-bottom:11px;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent);border-radius:5px 0 0 5px;}
.qtag{display:inline-block;font-size:.67rem;font-weight:700;padding:2px 9px;border-radius:9px;margin-bottom:10px;letter-spacing:.05em;}
.qtag.mc{background:#d6eaf8;color:var(--teal);}
.qtag.tf{background:#fef8e6;color:#a07800;}
.qtag.fill{background:#e8f8ee;color:var(--green);}
.qtag.match{background:#fce8d0;color:#b06010;}
.qtag.sort{background:#fde8d0;color:#d35400;}

.qtext{font-size:clamp(.9rem,2.7vw,1.08rem);font-weight:700;color:var(--ink);line-height:1.75;margin-bottom:13px;}
.qsub{font-size:.78rem;color:rgba(10,26,42,.43);margin-bottom:11px;font-style:italic;}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:380px){.opts{grid-template-columns:1fr;}}
.opt{background:#eaf4fd;border:2px solid #aed6f1;border-radius:9px;padding:9px 11px;font-size:.83rem;color:var(--ink);cursor:pointer;text-align:left;transition:all .17s;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--accent);background:#d6eaf8;}
.opt.ok{background:#d4f5e2;border-color:var(--green);color:var(--green);font-weight:700;}
.opt.bad{background:#fad8d8;border-color:var(--red);color:var(--red);}

.tf-row{display:flex;gap:9px;justify-content:center;}
.tfbtn{flex:1;max-width:125px;padding:12px;border-radius:11px;border:2px solid #aed6f1;background:#eaf4fd;font-size:1.25rem;font-weight:900;cursor:pointer;transition:all .17s;color:var(--ink);}
.tfbtn:hover:not(:disabled){transform:scale(1.05);}
.tfbtn.ok{background:#d4f5e2;border-color:var(--green);}
.tfbtn.bad{background:#fad8d8;border-color:var(--red);}

.fill-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fill-in{border:2px solid #ccc;border-radius:8px;padding:8px 11px;font-size:.9rem;outline:none;min-width:130px;flex:1;transition:border-color .2s;color:var(--ink);background:white;}
.fill-in:focus{border-color:var(--accent);}
.fill-in.ok{border-color:var(--green);background:#d4f5e2;}
.fill-in.bad{border-color:var(--red);background:#fad8d8;}
.sub-btn{background:var(--blue);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:.83rem;font-weight:700;cursor:pointer;}

.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.match-col{display:flex;flex-direction:column;gap:5px;}
.match-item{background:#eaf4fd;border:2px solid #aed6f1;border-radius:9px;padding:8px 10px;font-size:.8rem;cursor:pointer;transition:all .17s;min-height:38px;display:flex;align-items:center;color:var(--ink);line-height:1.35;}
.match-item:hover:not(.done){border-color:var(--accent);}
.match-item.selected{border-color:var(--gold);background:#d6eaf8;font-weight:700;}
.match-item.matched{border-color:var(--green);background:#d4f5e2;color:var(--green);font-weight:700;}
.match-item.wrong-flash{border-color:var(--red);background:#fad8d8;}

.sort-list{display:flex;flex-direction:column;gap:6px;}
.sort-item{background:#d6eaf8;border:2px solid #aed6f1;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:grab;font-size:.83rem;user-select:none;color:var(--ink);}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:.4;}
.sort-handle{color:#aaa;}
.sort-check{background:var(--teal);color:white;border:none;border-radius:9px;padding:9px 20px;font-weight:700;font-size:.83rem;cursor:pointer;margin-top:8px;}

.fb-box{border-radius:10px;padding:10px 13px;margin-top:11px;font-size:.82rem;line-height:1.6;display:none;}
.fb-box.show{display:block;}
.fb-box.ok{background:#d4f5e2;color:var(--green);border-left:4px solid var(--green);}
.fb-box.bad{background:#fad8d8;color:var(--red);border-left:4px solid var(--red);}
.fb-title{font-weight:900;margin-bottom:2px;}

.next-btn{background:var(--ink);color:white;border:none;border-radius:10px;padding:12px 0;font-weight:900;font-size:.95rem;cursor:pointer;width:100%;max-width:680px;margin-top:4px;display:none;transition:background .2s;}
.next-btn.show{display:block;}
.next-btn:hover{background:var(--accent);}

#result{background:linear-gradient(155deg,#d6eaf8 0%,#f0f8ff 100%);padding:32px 14px;justify-content:center;}
.result-card{background:white;border-radius:18px;padding:28px 22px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 26px var(--shadow);}
.r-emoji{font-size:3.3rem;margin-bottom:8px;}
.r-title{font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:5px;}
.r-score{font-size:2.8rem;font-weight:900;color:var(--accent);}
.r-max{font-size:.8rem;color:rgba(10,26,42,.4);margin-bottom:13px;}
.r-stars{font-size:1.7rem;margin-bottom:13px;}
.r-msg{font-size:.86rem;color:rgba(10,26,42,.58);line-height:1.7;margin-bottom:16px;}
.r-weak{background:var(--bg);border-radius:9px;padding:11px 13px;text-align:left;margin-bottom:16px;}
.r-weak h4{color:var(--accent);font-size:.76rem;letter-spacing:.1em;margin-bottom:5px;}
.r-weak p{font-size:.78rem;color:rgba(10,26,42,.68);line-height:1.8;}
.r-saved{font-size:.73rem;color:var(--teal);margin-top:9px;}
.r-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.r-btn{flex:1;padding:10px;border-radius:9px;font-weight:900;font-size:.9rem;cursor:pointer;border:none;transition:all .2s;}
.r-btn.pri{background:var(--red);color:white;}
.r-btn.sec{background:#eaf4fd;color:var(--ink);}
.r-btn.ter{background:var(--teal);color:white;}
.r-btn:hover{transform:translateY(-2px);}

.combo{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:999;font-size:2.1rem;font-weight:900;color:var(--accent);pointer-events:none;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);}
.combo.show{transform:translate(-50%,-80%) scale(1);}
.cf{position:fixed;top:-10px;width:8px;height:14px;border-radius:2px;pointer-events:none;z-index:998;animation:fall 2s ease-in forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<div class="screen active" id="home">
  <div class="home-header">
    <div class="brush-title">公民闖關王</div>
    <div class="home-badge">公民 第三冊 · 單元5-7 · 會考複習</div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-panel="play">🎮 開始遊戲</div>
    <div class="nav-tab" data-panel="wrong">❌ 錯題複習區</div>
  </div>
  <div class="tab-panel active" id="panel-play">
    <div class="slabel">選擇單元（可多選）</div>
    <div class="topic-row" id="topicRow">
      <div class="tchip on" data-t="u5a">🏛️ 國家構成與存在目的</div>
      <div class="tchip on" data-t="u5b">⚖️ 法治與法律概念</div>
      <div class="tchip on" data-t="u5c">📜 憲法與基本權利</div>
      <div class="tchip on" data-t="u6a">🏢 中央政府與五權</div>
      <div class="tchip on" data-t="u6b">🏙️ 地方政府與均權</div>
      <div class="tchip on" data-t="u7a">📢 公共意見與媒體</div>
      <div class="tchip on" data-t="u7b">🗳️ 選舉與政治參與</div>
    </div>
    <div class="slabel">選擇模式</div>
    <div class="mode-grid">
      <div class="mcard" data-m="normal"><span class="micon">📝</span><div class="mtitle">練習模式</div><div class="mdesc">不限時・50題・有解析</div></div>
      <div class="mcard" data-m="timed"><span class="micon">⏱️</span><div class="mtitle">限時模式</div><div class="mdesc">每題20秒・50題</div></div>
      <div class="mcard" data-m="blitz"><span class="micon">⚡</span><div class="mtitle">閃電模式</div><div class="mdesc">每題8秒・20題</div></div>
      <div class="mcard" data-m="survival"><span class="micon">❤️</span><div class="mtitle">生存模式</div><div class="mdesc">答錯3次結束・20題</div></div>
    </div>
    <button class="go-btn" id="goBtn" disabled>請選擇單元與模式</button>
  </div>
  <div class="tab-panel" id="panel-wrong">
    <div class="wrong-panel" id="wrongPanel"></div>
    <button class="practice-wrong-btn" id="practiceWrongBtn" style="display:none;" onclick="startWrongPractice()">針對錯題練習 🔥</button>
    <button class="clear-wrong-btn" id="clearWrongBtn" style="display:none;" onclick="clearWrong()">清除所有錯題記錄</button>
  </div>
</div>

<div class="screen" id="game">
  <div class="gbar">
    <div>
      <div class="gbar-left" id="gInfo">第 1 / 50 題</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="gbar-timer" id="gTimer" style="display:none;">20</div>
      <div>
        <div class="gbar-score" id="gScore">0 分</div>
        <div style="font-size:.67rem;color:rgba(255,255,255,.48);text-align:right;margin-top:2px;" id="gLives"></div>
      </div>
    </div>
  </div>
  <div class="qcard">
    <div class="qtag mc" id="qtag">選擇題</div>
    <div class="qtext" id="qtext">載入中…</div>
    <div class="qsub" id="qsub"></div>
    <div id="ans-area"></div>
    <div class="fb-box" id="fbbox">
      <div class="fb-title" id="fbtitle"></div>
      <div id="fbmsg"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn">下一題 →</button>
</div>

<div class="screen" id="result">
  <div class="result-card">
    <div class="r-emoji" id="rEmoji">🎉</div>
    <div class="r-title" id="rTitle">太棒了！</div>
    <div class="r-score" id="rScore">0</div>
    <div class="r-max" id="rMax">分</div>
    <div class="r-stars" id="rStars">⭐⭐⭐</div>
    <div class="r-msg" id="rMsg"></div>
    <div class="r-weak" id="rWeak" style="display:none;"><h4>📌 本次建議複習</h4><p id="rWeakList"></p></div>
    <div class="r-saved" id="rSaved"></div>
    <div class="r-btns">
      <button class="r-btn pri" onclick="restart()">再玩一次 🔄</button>
      <button class="r-btn ter" onclick="goWrong()">查看錯題 ❌</button>
      <button class="r-btn sec" onclick="goHome()">回首頁 🏠</button>
    </div>
  </div>
</div>
<div class="combo" id="combo"></div>

<script>
const SK='civ3_wrong_v1';
function loadWB(){try{return JSON.parse(localStorage.getItem(SK)||'[]');}catch(e){return[];}}
function saveWB(a){try{localStorage.setItem(SK,JSON.stringify(a));}catch(e){}}
function addWB(q){let b=loadWB();const i=b.findIndex(x=>x.q===q.q);if(i===-1){b.push({...q,wrongCount:1,lastWrong:Date.now()});}else{b[i].wrongCount=(b[i].wrongCount||1)+1;b[i].lastWrong=Date.now();}saveWB(b);}
function removeWB(q){let b=loadWB();b=b.filter(x=>x.q!==q.q);saveWB(b);}

const QB=[

// ══ 單元5a：國家構成與存在目的 ══
{t:'u5a',era:'國家・四要素辨認',type:'mc',
 q:'下列何者不是國家的構成要素？',
 opts:['A 人民','B 領土','C 共同的語言','D 主權'],ans:2,
 explain:'國家四要素：人民、領土、政府、主權，缺一不可。語言並非構成國家的必要條件，一個國家可以有多種語言。'},

{t:'u5a',era:'國家・四要素辨認',type:'mc',
 q:'「國家統治機關，負責制定和執行法令及政策，包含中央政府和地方政府」，這說明的是國家哪項要素？',
 opts:['A 人民','B 領土','C 政府','D 主權'],ans:2,
 explain:'政府是國家的統治機關，分管國家公共事務，是四要素之一。人口代表人民、土地代表領土、武力代表政府、主權代表國家最高權力。'},

{t:'u5a',era:'國家・四要素辨認',type:'match',
 q:'請將國家四要素與其說明配對：',
 pairs:[
   ['人民','組成國家的分子，須具備該國國籍'],
   ['領土','國家統治權力所能支配的地理區域，含領海領空'],
   ['政府','國家的統治機關，負責制訂與執行法令'],
   ['主權','國家的最高權力，對內最高性、對外獨立性'],
 ],
 explain:'人民→國籍成員；領土→地理範圍（含領海12浬、經濟海域200浬）；政府→統治機關；主權→最高且獨立的國家權力。'},

{t:'u5a',era:'國家・存在目的',type:'mc',
 q:'「組織軍隊建立國防，抵禦外患，維護國家領土完整」，這是國家存在目的中哪項功能？',
 opts:['A 秩序','B 安全','C 人權','D 福利'],ans:1,
 explain:'國家存在目的包含安全、秩序、人權、福利、經濟、文化六大功能。組建軍隊保衛國家安全屬於「安全」功能。'},

{t:'u5a',era:'國家・存在目的',type:'match',
 q:'請將國家功能的「目的」與「方式」配對：',
 pairs:[
   ['設立警察機關','維護社會秩序'],
   ['制定法律保障人民自由','保障基本人權'],
   ['推動社會福利政策','照顧弱勢群體'],
   ['改善教育及文化環境','保存文化傳統'],
 ],
 explain:'秩序→設警察；人權→制定法律；福利→社會政策；文化→改善教育環境。注意安全目的的方式是組建軍隊與推動外交。'},

{t:'u5a',era:'國家vs政府',type:'mc',
 q:'「國家主權對外具獨立性，對內具最高性」，而「政府是國家的組成要素之一，具備統治權」，兩者最主要的差別是？',
 opts:['A 兩者完全相同','B 國家是政治實體，具穩定持續性；政府隨制度變遷而改變','C 政府比國家更重要','D 國家滅亡政府就消失'],ans:1,
 explain:'國家vs政府：①範圍不同（國家包含四要素，政府是要素之一）②持續性不同（國家不滅亡，政府可更替）③權力不同（國家主權獨立，政府具統治權但可被取代）。'},

{t:'u5a',era:'民主治理・主權在民',type:'mc',
 q:'「主權在民」的民主國家，政府的合法性來自於？',
 opts:['A 軍事力量','B 人民的授權與支持','C 經濟實力','D 國際認可'],ans:1,
 explain:'民主國家核心是主權在民，人民是國家的主人。政府的組成需獲得多數選民支持，統治的合法性來自人民的授權（定期選舉）。'},

{t:'u5a',era:'民主治理・定期選舉',type:'tf',
 q:'獨裁國家也屬於法治社會，因為獨裁者也會制定法律。',
 ans:false,
 explain:'獨裁國家是人治社會，不是法治社會。人治社會的法律由統治者意思決定，朝令夕改；法治社會的法律由人民代表依一定程序制定，具有穩定性。'},

{t:'u5a',era:'民主治理・四大特色',type:'sort',
 q:'請將下列民主政治特色從「最基本的民主精神」到「落實民主的制度設計」排序：',
 items:['政黨政治（多黨公平競爭執政）','民意政治（政府施政須重視民意）','法治政治（政府依法行政）','責任政治（政府施政須向人民負責）'],
 correctOrder:[1,2,3,0],
 explain:'民主政治四大特色：民意政治（基礎）→法治政治（規範）→責任政治（課責）→政黨政治（競爭）。'},

// ══ 單元5b：法治與法律概念 ══
{t:'u5b',era:'法治・人治vs法治',type:'mc',
 q:'「國家統治者依照自己的意思制定或修改法律，聯即法律」，這描述的是哪種社會？',
 opts:['A 法治社會','B 人治社會','C 民主社會','D 憲政社會'],ans:1,
 explain:'人治社會：法律由統治者個人意思決定，朝令夕改，無一定標準。法治社會：由人民選出的代表依一定程序制定法律，標準明確，人民可預期法律效果。'},

{t:'u5b',era:'法治・人治vs法治',type:'match',
 q:'請將「人治社會」與「法治社會」的特徵配對：',
 pairs:[
   ['法律制定：統治者意思即法律，聯即法律','人治社會'],
   ['法律執行：依據統治者想法而變動，無一定標準','人治社會'],
   ['法律制定：人民代表依一定程序修改法律','法治社會'],
   ['法律目的：限制政府權力，保障人民權利','法治社會'],
 ],
 explain:'人治：統治者意思＝法律，無標準，政治形態多為獨裁國家。法治：程序制定，標準明確，限制政府權力，政治形態為民主憲政國家。'},

{t:'u5b',era:'法律概念・廣義法律三層',type:'mc',
 q:'廣義法律中位階最高且效力最強的是？',
 opts:['A 法律（狹義）','B 命令','C 憲法','D 條例'],ans:2,
 explain:'廣義法律三層：憲法（最高、最強）→法律（狹義，中等）→命令（最低、最弱）。憲法名稱為「憲法」及「憲法增修條文」。'},

{t:'u5b',era:'法律概念・廣義法律三層',type:'sort',
 q:'請將廣義法律的三個位階依高到低排列：',
 items:['命令（規程、規則、細則、辦法等）','憲法（位階最高、效力最強）','法律（狹義）（法、律、條例、通則）'],
 correctOrder:[1,2,0],
 explain:'位階由高到低：憲法→法律（狹義）→命令。位階較低者不得牴觸位階較高者，否則無效。'},

{t:'u5b',era:'法律概念・名稱辨認',type:'mc',
 q:'「行政機關基於法律授權所發布的規定，包含規程、細則、辦法等」屬於廣義法律中的哪個層次？',
 opts:['A 憲法','B 法律（狹義）','C 命令','D 以上皆是'],ans:2,
 explain:'命令：行政機關基於法律授權所發布，位階最低，效力最弱。名稱包含規程、規則、細則、辦法、綱要、標準、準則。'},

{t:'u5b',era:'法律概念・名稱辨認',type:'mc',
 q:'「立法院制定，並由總統公布施行的法規」，其名稱應屬於哪一層？',
 opts:['A 命令','B 法律（狹義）','C 憲法','D 地方法規'],ans:1,
 explain:'狹義法律：由立法院制定，總統公布，名稱為法、律、條例、通則。例如：民法、刑法、勞動基準法、公司條例等。'},

{t:'u5b',era:'法律概念・違憲審查',type:'tf',
 q:'司法院大法官可透過憲法法庭裁判，宣告違憲的法律無效。',
 ans:true,
 explain:'司法院大法官組成憲法法庭，可以公告裁判書宣告違憲的法律失效（取代過去的解釋文方式）。這是憲法最高性的具體體現。'},

{t:'u5b',era:'法律概念・憲法修正',type:'mc',
 q:'修改憲法的提案由哪個機關提出？',
 opts:['A 行政院','B 立法院','C 司法院','D 總統'],ans:1,
 explain:'憲法修正案由立法院提出，需立法委員四分之一提議、四分之三出席、出席委員四分之三決議，公告半年後，再交由選舉人（公民）投票複決（須有效同意票超過選舉人總額的二分之一）。'},

// ══ 單元5c：憲法與基本權利 ══
{t:'u5c',era:'憲法・三大特性',type:'mc',
 q:'「憲法的內容多為原則性規定，較不詳細」，這是憲法哪項特性？',
 opts:['A 最高性','B 固定性','C 原則性','D 強制性'],ans:2,
 explain:'憲法三大特性：最高性（位階最高）、固定性（修改困難）、原則性（內容簡潔，具體規範由其他法律落實）。'},

{t:'u5c',era:'憲法・三大特性',type:'match',
 q:'請將憲法三大特性與其說明配對：',
 pairs:[
   ['最高性','位階最高，所有法律不得牴觸憲法，否則無效'],
   ['固定性','修改程序比一般法律困難，為國家長治久安'],
   ['原則性','內容簡潔，具原則性，不詳細規定執行細節'],
 ],
 explain:'最高性→位階保障；固定性→修改困難；原則性→內容簡潔。三者使憲法成為國家根本大法。'},

{t:'u5c',era:'基本權利・五大類',type:'mc',
 q:'「每個人在法律上享有平等地位，不因性別、種族、黨派而有差別待遇」，這描述的是哪項基本權利？',
 opts:['A 自由權','B 平等權','C 受益權','D 參政權'],ans:1,
 explain:'平等權：在法律上一律平等。中華民國人民，無分男女、宗教、種族、階級、黨派，在法律上一律平等。'},

{t:'u5c',era:'基本權利・五大類',type:'mc',
 q:'「人身不可侵犯、居住遷徙自由、意見自由、秘密通訊自由、宗教信仰自由、集會結社自由」屬於哪類基本權利？',
 opts:['A 平等權','B 受益權','C 自由權','D 參政權'],ans:2,
 explain:'自由權（消極權利）：人民有排除政府不當干涉的權利，包含人身自由、居住遷徙、意見、秘密通訊、宗教信仰、集會結社自由。'},

{t:'u5c',era:'基本權利・受益權',type:'mc',
 q:'「向政府請求維持最低生活水準」是受益權中哪項具體內容？',
 opts:['A 工作權','B 生存權','C 財產權','D 訴訟權'],ans:1,
 explain:'受益權（積極權利）分三類：①經濟面：生存權、工作權、財產權；②行政面：請願權、訴願權；③司法面：訴訟權；④教育面：受國民教育的權利。生存權指維持最低生活標準。'},

{t:'u5c',era:'基本權利・參政權',type:'mc',
 q:'「選舉、罷免、創制、複決、應考試、服公職」屬於哪類基本權利？',
 opts:['A 自由權','B 受益權','C 平等權','D 參政權'],ans:3,
 explain:'參政權：人民參與政治事務的權利，屬於公民權。包含選舉權、罷免權、創制權、複決權（屬新興人權，公民投票）及應考試、服公職權。'},

{t:'u5c',era:'基本權利・創制vs複決',type:'tf',
 q:'創制權是「從有到無」，複決權是「從無到有」。',
 ans:false,
 explain:'剛好相反！創制權：從無到有，人民主動提出立法原則或制定政策。複決權：從有到無（確認或修改），人民對已有法案或政策表示同意或否決。'},

{t:'u5c',era:'基本權利・形式vs實質平等',type:'mc',
 q:'「依據身心障礙學生各項需求，設置特殊考場」體現的是哪種平等概念？',
 opts:['A 形式平等（機會平等）','B 實質平等（合理差別待遇）','C 法律之前人人平等','D 結果平等'],ans:1,
 explain:'實質平等：對弱勢群體給予合理的差別待遇，以達到真正的公平。形式平等是一律相同對待；實質平等是根據需求提供不同協助（如設特殊考場），達到立足點平等。'},

{t:'u5c',era:'基本權利・其他權利',type:'mc',
 q:'下列何者屬於「其他基本權利」（新興人權）？',
 opts:['A 選舉權','B 生存權','C 環境權','D 人身自由'],ans:2,
 explain:'其他基本權利（新興人權）：環境權、人格權、勞動權、多元文化權。這些是在傳統五大類之外，憲法第22條保障的其他自由與權利。'},

// ══ 單元6a：中央政府與五權 ══
{t:'u6a',era:'五權・分立理論',type:'mc',
 q:'英國學者艾克頓爵士說「權力使人腐化，絕對的權力使人___腐化」，因此需要進行權力分立。',
 opts:['A 輕微','B 逐漸','C 絕對','D 相對'],ans:2,
 explain:'「絕對的權力使人絕對腐化」是權力分立最重要的理論依據。為避免權力濫用，現代民主國家將權力分散給不同機關，並使其相互監督制衡。'},

{t:'u6a',era:'五權・三權vs五權',type:'mc',
 q:'「三權分立」和「五權憲法」的差異在於？',
 opts:[
   'A 三權多了考試權和監察權',
   'B 五權憲法在三權（行政、立法、司法）基礎上，加入考試權與監察權',
   'C 兩者完全相同',
   'D 五權來自英國'
 ],ans:1,
 explain:'三權分立（孟德斯鳩提出）：行政、立法、司法。五權憲法（孫中山提出）：加入考試權（避免用人唯親）與監察權（參考中國古代御史制度），形成我國特有制度。'},

{t:'u6a',era:'五權・職權分工',type:'match',
 q:'請將中央政府五院與其核心職權配對：',
 pairs:[
   ['行政院','最高行政機關，執行法律、管理公共事務，向立法院負責'],
   ['立法院','最高立法機關，制定修廢法律，審查國家預算，監督行政'],
   ['司法院','最高司法機關，大法官組成憲法法庭，審查法律是否違憲'],
   ['考試院','最高考試機關，選拔任用國家公務員，辦理公務人員考試'],
   ['監察院','最高監察機關，彈劾糾舉失職公務員，糾正行政機關'],
 ],

{t:'u6a',era:'總統・職權',type:'mc',
 q:'依我國憲法規定，總統的產生方式為何？',
 opts:['A 由行政院長提名','B 由立法院選出','C 由公民直選，任期4年可連任一次','D 由國民大會選出'],ans:2,
 explain:'依憲法增修條文，總統、副總統由中華民國自由地區全體人民直接選舉產生，任期4年，連選得連任一次。'},

{t:'u6a',era:'總統・職權',type:'mc',
 q:'總統的「人事任免」職權中，哪些官員由總統直接任命（不需立法院同意）？',
 opts:['A 行政院院長','B 司法院院長','C 考試院院長','D 監察委員'],ans:0,
 explain:'行政院院長由總統直接任命，不需立法院同意。其他如司法院院長、考試院院長、監察委員等，需由總統提名，經立法院同意後任命。'},

{t:'u6a',era:'總統・職權',type:'tf',
 q:'總統得在不須行政院院長副署的情況下，解散立法院。',
 ans:false,
 explain:'總統主動解散立法院需有前提：立法院對行政院長提出不信任案且通過後，行政院長才可呈請總統解散立法院。總統不能主動、任意解散立法院。'},

{t:'u6a',era:'行政立法・覆議不信任',type:'mc',
 q:'「立法院認為行政院施政不當，向行政院長提出___，若通過，行政院長應辭職或請總統解散立法院。」',
 opts:['A 彈劾案','B 覆議案','C 不信任案','D 糾舉案'],ans:2,
 explain:'不信任案：立法院對行政院長提出，通過後行政院長應辭職（或呈請總統解散立法院）。覆議案：行政院對立法院決議不滿，向立法院提出要求重議。'},

{t:'u6a',era:'行政立法・覆議不信任',type:'match',
 q:'請將「覆議案」與「不信任案」的特徵配對：',
 pairs:[
   ['提出機關：行政院（對立法院）','覆議案'],
   ['提出機關：立法院（對行政院長）','不信任案'],
   ['對象：法律案、預算案、條約案等決議','覆議案'],
   ['結果：通過後行政院長應辭職','不信任案'],
 ],
 explain:'覆議：行政院→立法院，針對議案。不信任：立法院→行政院長，針對人。兩者是行政與立法相互制衡的重要機制。'},

{t:'u6a',era:'監察・糾舉彈劾糾正',type:'mc',
 q:'「監察院對中央及地方行政機關不當施政，提出___，要求其改善。」',
 opts:['A 糾舉','B 彈劾','C 糾正','D 彈正'],ans:2,
 explain:'監察院三大職權：糾舉（針對個別公務員，移送懲戒）、彈劾（針對公務員含總統副總統，移送憲法法庭或懲戒法院）、糾正（針對行政機關不當施政，要求改善）。'},

{t:'u6a',era:'監察・糾舉彈劾糾正',type:'sort',
 q:'某公務員瀆職，監察院的處理流程應為：',
 items:['監察院審查案件，成立後對公務員提出糾舉','監察委員發現公務員違法或失職','移送公務員所屬主管機關或上級機關處理','監察委員行使調查權'],
 correctOrder:[1,3,0,2],
 explain:'流程：發現違失→調查→成案提糾舉→移送主管機關。彈劾案則移送懲戒法院或憲法法庭（針對總統副總統）。'},

// ══ 單元6b：地方政府與均權制度 ══
{t:'u6b',era:'地方・三級架構',type:'mc',
 q:'「縣（市）政府」在地方政府架構中屬於第幾級？',
 opts:['A 第一級','B 第二級','C 第三級','D 省級'],ans:1,
 explain:'地方政府三級：第一級→直轄市政府（6都）；第二級→縣（市）政府；第三級→鄉（鎮、市）公所（直轄市下為區公所）。'},

{t:'u6b',era:'地方・均權制度',type:'mc',
 q:'「中央政府與地方政府的權限依事務性質劃分」，這是什麼制度？',
 opts:['A 省虛級化','B 均權制度','C 三權分立','D 地方自治'],ans:1,
 explain:'均權制度：依事務性質，全國一致者歸中央，因地制宜者歸地方。若有爭議由司法院（大法官）解釋憲法解決。'},

{t:'u6b',era:'地方・均權制度',type:'match',
 q:'請將地方政府的「自治事務」範疇與例子配對：',
 pairs:[
   ['安全衛生','警察局維護地方治安、消防局防火救災'],
   ['經濟發展','發展觀光事業、振興產業與都市發展'],
   ['教育文化','推動國民教育、設立文化中心'],
   ['社會福利','辦理低收入戶社會救助'],
 ],
 explain:'地方自治事務：安全衛生、經濟發展、教育文化、社會福利（社會服務）。注意教育：教育局歸中央規畫，地方政府負責執行中央委辦事項。'},

{t:'u6b',era:'地方・省虛級化',type:'mc',
 q:'「省虛級化」是依據民國幾年的憲法修正？',
 opts:['A 民國75年','B 民國82年','C 民國86年','D 民國89年'],ans:2,

// ══ STATE & LOGIC ══
let S={mode:null,topics:[],qs:[],cur:0,score:0,lives:3,combo:0,answered:false,timer:null,tval:0,wrong:{},isWP:false};

document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
    if(tab.dataset.panel==='wrong')renderWP();
  });
});
document.querySelectorAll('.tchip').forEach(c=>c.addEventListener('click',()=>{c.classList.toggle('on');updateGo();}));
document.querySelectorAll('.mcard').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.mcard').forEach(x=>x.classList.remove('picked'));c.classList.add('picked');S.mode=c.dataset.m;updateGo();}));
function updateGo(){
  S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);
  const btn=document.getElementById('goBtn');
  if(S.topics.length&&S.mode){btn.disabled=false;btn.textContent='開始闖關 🚀';}
  else{btn.disabled=true;btn.textContent='請選擇單元與模式';}
}
document.getElementById('goBtn').addEventListener('click',startGame);

function startGame(){
  S.topics=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);
  S.score=0;S.lives=3;S.combo=0;S.answered=false;S.wrong={};S.isWP=false;
  const isLong=S.mode==='normal'||S.mode==='timed';
  let pool=QB.filter(q=>S.topics.includes(q.t));
  pool=shuffle(pool);
  S.qs=pool.slice(0,Math.min(isLong?50:20,pool.length));
  S.cur=0;showScreen('game');renderQ();
}
function startWrongPractice(){
  const bank=loadWB();if(!bank.length){alert('沒有錯題記錄！');return;}
  S.score=0;S.lives=3;S.combo=0;S.answered=false;S.wrong={};S.isWP=true;S.mode='normal';
  S.qs=shuffle([...bank]).slice(0,Math.min(20,bank.length));S.cur=0;showScreen('game');renderQ();
}

function renderQ(){
  if(S.cur>=S.qs.length){showResult();return;}
  const q=S.qs[S.cur];S.answered=false;
  const total=S.qs.length;
  document.getElementById('gInfo').textContent=`第 ${S.cur+1} / ${total} 題${S.isWP?' 📌錯題':''}`;
  document.getElementById('progFill').style.width=`${(S.cur/total)*100}%`;
  document.getElementById('gScore').textContent=`${S.score} 分`;
  if(S.mode==='survival')document.getElementById('gLives').textContent='❤️'.repeat(Math.max(0,S.lives))+'🖤'.repeat(Math.max(0,3-S.lives));
  else document.getElementById('gLives').textContent='';
  const tMap={mc:'選擇題',tf:'是非題',fill:'填空題',match:'連連看',sort:'排序題'};
  const cMap={mc:'mc',tf:'tf',fill:'fill',match:'match',sort:'sort'};
  document.getElementById('qtag').textContent=tMap[q.type]||'題目';
  document.getElementById('qtag').className=`qtag ${cMap[q.type]||'mc'}`;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('qsub').textContent=q.hint||'';
  const area=document.getElementById('ans-area');area.innerHTML='';
  document.getElementById('fbbox').className='fb-box';
  document.getElementById('nextBtn').className='next-btn';
  if(q.type==='mc')renderMC(q,area);
  else if(q.type==='tf')renderTF(q,area);
  else if(q.type==='fill')renderFill(q,area);
  else if(q.type==='match')renderMatch(q,area);
  else if(q.type==='sort')renderSort(q,area);
  clearInterval(S.timer);
  const te=document.getElementById('gTimer');
  if(S.mode==='blitz'||S.mode==='timed'){te.style.display='block';startTimer(S.mode==='blitz'?8:20);}
  else te.style.display='none';
}

function renderMC(q,area){
  const grid=document.createElement('div');grid.className='opts';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='opt';btn.textContent=o;
    btn.addEventListener('click',()=>{
      if(S.answered)return;S.answered=true;clearInterval(S.timer);
      const ok=i===q.ans;
      grid.querySelectorAll('.opt').forEach((b,bi)=>{b.disabled=true;if(bi===q.ans)b.classList.add('ok');else if(bi===i&&!ok)b.classList.add('bad');});
      finish(ok,q);
    });
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}
function renderTF(q,area){
  const row=document.createElement('div');row.className='tf-row';
  ['⭕ 正確','❌ 錯誤'].forEach((label,i)=>{
    const btn=document.createElement('button');btn.className='tfbtn';btn.innerHTML=label;
    btn.addEventListener('click',()=>{
      if(S.answered)return;S.answered=true;clearInterval(S.timer);
      const userT=i===0,ok=userT===q.ans;
      row.querySelectorAll('.tfbtn').forEach((b,bi)=>{b.disabled=true;const bT=bi===0;if(bT===q.ans)b.classList.add('ok');else if(bT===userT&&!ok)b.classList.add('bad');});
      finish(ok,q);
    });
    row.appendChild(btn);
  });
  area.appendChild(row);
}
function renderFill(q,area){
  const row=document.createElement('div');row.className='fill-row';
  const inp=document.createElement('input');inp.className='fill-in';inp.placeholder='輸入答案…';
  const btn=document.createElement('button');btn.className='sub-btn';btn.textContent='確認';
  const go=()=>{if(S.answered||!inp.value.trim())return;S.answered=true;clearInterval(S.timer);const val=inp.value.trim();const ok=val===q.ans||(q.alts&&q.alts.some(a=>val.includes(a)));inp.disabled=true;btn.disabled=true;inp.classList.add(ok?'ok':'bad');finish(ok,q,ok?null:`正確：${q.ans}`);};
  btn.addEventListener('click',go);inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  row.append(inp,btn);area.appendChild(row);
}
function renderMatch(q,area){
  const wrap=document.createElement('div');wrap.className='match-wrap';
  const lCol=document.createElement('div');lCol.className='match-col';
  const rCol=document.createElement('div');rCol.className='match-col';
  const pairs=q.pairs;const shuffledR=shuffle([...pairs.map((p,i)=>({text:p[1],origIdx:i}))]);
  let lPicked=null,rPicked=null,matched=0;
  pairs.forEach((p,i)=>{const el=document.createElement('div');el.className='match-item';el.textContent=p[0];el.dataset.idx=i;el.dataset.side='left';lCol.appendChild(el);});
  shuffledR.forEach(p=>{const el=document.createElement('div');el.className='match-item';el.textContent=p.text;el.dataset.origIdx=p.origIdx;el.dataset.side='right';rCol.appendChild(el);});
  wrap.append(lCol,rCol);area.appendChild(wrap);
  function tryM(){
    if(!lPicked||!rPicked)return;
    const li=parseInt(lPicked.dataset.idx),ri=parseInt(rPicked.dataset.origIdx);
    if(li===ri){[lPicked,rPicked].forEach(el=>{el.classList.remove('selected');el.classList.add('matched','done');});matched++;if(matched===pairs.length){S.answered=true;clearInterval(S.timer);finish(true,q);}}
    else{[lPicked,rPicked].forEach(el=>el.classList.add('wrong-flash'));setTimeout(()=>{if(lPicked)lPicked.classList.remove('selected','wrong-flash');if(rPicked)rPicked.classList.remove('selected','wrong-flash');lPicked=null;rPicked=null;},600);return;}
    lPicked=null;rPicked=null;
  }
  wrap.addEventListener('click',e=>{
    if(S.answered)return;const item=e.target.closest('.match-item');if(!item||item.classList.contains('matched'))return;
    if(item.dataset.side==='left'){if(lPicked)lPicked.classList.remove('selected');lPicked=item;item.classList.add('selected');}
    else{if(rPicked)rPicked.classList.remove('selected');rPicked=item;item.classList.add('selected');}
    tryM();
  });
}
let dragEl=null;
function renderSort(q,area){
  const shuffled=shuffle([...q.items.keys()].map(i=>({i,text:q.items[i]})));
  const list=document.createElement('div');list.className='sort-list';
  shuffled.forEach(item=>{
    const el=document.createElement('div');el.className='sort-item';el.draggable=true;el.dataset.orig=item.i;
    el.innerHTML=`<span class="sort-handle">☰</span><span>${item.text}</span>`;
    el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',e=>{e.preventDefault();if(dragEl&&dragEl!==el){const all=[...list.querySelectorAll('.sort-item')];const si=all.indexOf(dragEl),ti=all.indexOf(el);if(si<ti)list.insertBefore(dragEl,el.nextSibling);else list.insertBefore(dragEl,el);}});
    list.appendChild(el);
  });
  area.appendChild(list);
  const chk=document.createElement('button');chk.className='sort-check';chk.textContent='確認順序 ✓';
  chk.addEventListener('click',()=>{if(S.answered)return;S.answered=true;clearInterval(S.timer);const order=[...list.querySelectorAll('.sort-item')].map(el=>+el.dataset.orig);finish(JSON.stringify(order)===JSON.stringify(q.correctOrder),q);});
  area.appendChild(chk);
}
function finish(ok,q,extraMsg){
  const pts=calcPts(ok,q.type);
  if(ok){S.score+=pts;S.combo++;document.getElementById('gScore').textContent=`${S.score} 分`;if(S.combo>=3)showCombo(S.combo);if(S.isWP)removeWB(q);}
  else{S.combo=0;if(S.mode==='survival')S.lives=Math.max(0,S.lives-1);S.wrong[q.era]=(S.wrong[q.era]||0)+1;addWB(q);}
  document.getElementById('fbtitle').textContent=ok?'✅ 答對了！':'❌ 答錯了';
  let msg=q.explain||'';if(extraMsg)msg=extraMsg+'　'+msg;
  document.getElementById('fbmsg').textContent=msg;
  document.getElementById('fbbox').className=`fb-box show ${ok?'ok':'bad'}`;
  const nb=document.getElementById('nextBtn');nb.className='next-btn show';
  const isLast=S.cur+1>=S.qs.length,isDead=S.mode==='survival'&&S.lives<=0;
  nb.textContent=(isLast||isDead)?'查看結果 →':'下一題 →';
  nb.onclick=()=>{S.cur++;if(S.cur>=S.qs.length||isDead)showResult();else renderQ();};
}
function calcPts(ok,type){if(!ok)return 0;const base={mc:5,tf:3,fill:6,match:8,sort:7}[type]||5;const combo=S.combo>=4?3:S.combo>=2?1:0;const mB=(S.mode==='blitz'||S.mode==='survival')?2:0;return base+combo+mB;}
function startTimer(sec){
  S.tval=sec;const el=document.getElementById('gTimer');el.textContent=sec;el.className='gbar-timer';
  S.timer=setInterval(()=>{
    S.tval--;el.textContent=S.tval;if(S.tval<=3)el.className='gbar-timer hot';
    if(S.tval<=0){clearInterval(S.timer);if(!S.answered){S.answered=true;S.combo=0;const q=S.qs[S.cur];
      document.getElementById('fbtitle').textContent='⏰ 時間到！';document.getElementById('fbmsg').textContent=q.explain||'';
      document.getElementById('fbbox').className='fb-box show bad';document.querySelectorAll('.opt,.tfbtn,.fill-in,.sub-btn').forEach(b=>b.disabled=true);
      if(S.mode==='survival')S.lives=Math.max(0,S.lives-1);S.wrong[q.era]=(S.wrong[q.era]||0)+1;addWB(q);
      const nb=document.getElementById('nextBtn');nb.className='next-btn show';nb.textContent=S.cur+1>=S.qs.length?'查看結果 →':'下一題 →';nb.onclick=()=>{S.cur++;if(S.cur>=S.qs.length)showResult();else renderQ();};}}
  },1000);
}
function showCombo(n){const el=document.getElementById('combo');el.textContent=`🔥 ${n}連勝！`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function showResult(){
  clearInterval(S.timer);showScreen('result');
  const max=S.qs.length*6;const pct=max>0?S.score/max:0;
  let emoji,title,msg;
  if(pct>=.9){emoji='🏆';title='公民高手！';msg='公民第三冊掌握得非常好！繼續保持！';}
  else if(pct>=.7){emoji='🎯';title='表現優異！';msg='大部分都答對了，再針對弱點複習！';}
  else if(pct>=.5){emoji='📖';title='繼續加油！';msg='去錯題複習區針對弱點加強！';}
  else{emoji='💪';title='不要灰心！';msg='把講義再仔細看一遍，再來挑戰！';}
  document.getElementById('rEmoji').textContent=emoji;document.getElementById('rTitle').textContent=title;
  document.getElementById('rScore').textContent=S.score;document.getElementById('rMax').textContent=`滿分約 ${max} 分`;
  document.getElementById('rStars').textContent=pct>=.9?'⭐⭐⭐⭐⭐':pct>=.7?'⭐⭐⭐⭐':pct>=.5?'⭐⭐⭐':'⭐⭐';
  document.getElementById('rMsg').textContent=msg;
  const weakList=Object.entries(S.wrong).sort((a,b)=>b[1]-a[1]);
  if(weakList.length){document.getElementById('rWeak').style.display='block';document.getElementById('rWeakList').innerHTML=weakList.map(([k,v])=>`• ${k}（答錯${v}題）`).join('<br>');}
  else document.getElementById('rWeak').style.display='none';
  const wc=loadWB().length;document.getElementById('rSaved').textContent=wc>0?`📌 錯題庫共有 ${wc} 題，可至錯題複習區加強`:'';
  if(pct>=.75)confetti();
}
function renderWP(){
  const bank=loadWB();const panel=document.getElementById('wrongPanel');
  const pw=document.getElementById('practiceWrongBtn');const cl=document.getElementById('clearWrongBtn');
  if(!bank.length){panel.innerHTML=`<div class="empty-wrong">🎉 目前沒有錯題記錄！<br>答錯的題目會自動記錄在這裡。</div>`;pw.style.display='none';cl.style.display='none';return;}
  const top=[...bank].sort((a,b)=>(b.wrongCount||1)-(a.wrongCount||1));
  panel.innerHTML=`<div class="wrong-summary"><h3>❌ 錯題統計</h3><div class="wrong-stats"><div class="wstat"><div class="wnum">${bank.length}</div><div class="wlbl">總錯題數</div></div><div class="wstat"><div class="wnum" style="color:var(--accent);">${top[0]?top[0].wrongCount:0}</div><div class="wlbl">最多錯${top[0]?'（'+top[0].era+'）':''}</div></div></div></div><div class="wrong-list">${top.map(q=>`<div class="wrong-item"><div class="wi-era">${q.era} · 答錯 ${q.wrongCount||1} 次</div><div class="wi-q">${q.q}</div><div class="wi-ans">✓ ${q.type==='tf'?(q.ans?'正確':'錯誤'):(q.opts?q.opts[q.ans]:q.ans||'')}</div></div>`).join('')}</div>`;
  pw.style.display='block';cl.style.display='block';
}
function clearWrong(){if(confirm('確定要清除所有錯題記錄嗎？')){saveWB([]);renderWP();}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function confetti(){const cols=['#2980b9','#1a6ea8','#1a5276','#154360','#d6eaf8'];for(let i=0;i<45;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cf';el.style.left=Math.random()*100+'vw';el.style.background=cols[Math.floor(Math.random()*cols.length)];el.style.animationDuration=(1.2+Math.random()*1.2)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);},i*35);}}
function restart(){startGame();}
function goHome(){showScreen('home');}
function goWrong(){showScreen('home');document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-panel="wrong"]').classList.add('active');document.getElementById('panel-wrong').classList.add('active');renderWP();}
</script>
